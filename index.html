<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펀치매니저 웹</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{
  --bg:#0F1117;--card:#1A1D27;--card2:#22263A;--border:#2E3350;
  --accent:#F5A623;--text:#F5F0F0;--muted:#7A80A0;--green:#2ECC71;--red:#E74C3C;
}
body{background:var(--bg);color:var(--text);min-height:100vh}

/* ── 로그인 ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px}
.login-icon{width:72px;height:72px;background:var(--card2);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px}
.login-title{text-align:center;font-size:24px;font-weight:900;color:var(--accent);margin-bottom:8px}
.login-sub{text-align:center;font-size:14px;color:var(--muted);margin-bottom:32px}
.field-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.field-input{width:100%;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.field-input:focus{border-color:var(--accent)}
.field-wrap{margin-bottom:16px}
.btn-primary{width:100%;padding:16px;background:var(--accent);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.error-box{background:#2D1A1A;border:1px solid rgba(231,76,60,.5);border-radius:8px;padding:12px;font-size:13px;color:var(--red);margin-top:12px}

/* ── 메인 ── */
#main-screen{display:none}
.topbar{background:#0A0C12;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100}
.topbar-title{color:var(--accent);font-size:16px;font-weight:900;flex:1}
.topbar-site{font-size:12px;color:var(--muted)}
.topbar-code{font-size:12px;color:var(--accent);font-weight:700;background:rgba(245,166,35,.1);padding:3px 8px;border-radius:6px}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:opacity .2s}
.btn-sm:hover{opacity:.85}
.btn-logout{background:var(--card2);color:var(--muted)}
.btn-excel{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}

.content{padding:24px;max-width:1400px;margin:0 auto}

/* ── 통계 ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:28px;font-weight:900}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}

/* ── 필터 ── */
.filters{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.filter-select{padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
.filter-input{padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;flex:1;min-width:160px}
.filter-input:focus,.filter-select:focus{border-color:var(--accent)}
.filter-label{font-size:12px;color:var(--muted)}

/* ── 테이블 ── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-count{font-size:13px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--card2)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(46,51,80,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:transform .2s}
.thumb:hover{transform:scale(1.05)}
.no-thumb{width:56px;height:56px;background:var(--card2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--border)}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.badge-open{background:rgba(92,107,192,.2);color:#AAB0E0}
.badge-done{background:rgba(46,204,113,.15);color:var(--green)}
.badge-click{cursor:pointer;transition:transform .15s,box-shadow .15s}
.badge-click:hover{transform:scale(1.1);box-shadow:0 0 8px rgba(245,166,35,.3)}
.user-tag{font-size:11px;color:var(--muted)}
.btn-del-row{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(231,76,60,.4);background:rgba(231,76,60,.1);color:var(--red);transition:all .2s;white-space:nowrap}
.btn-del-row:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-del-row:disabled{opacity:.4;cursor:not-allowed}
.row-deleting td{opacity:.4;pointer-events:none}

/* ── 이미지 모달 ── */
#img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;padding:24px}
#img-modal.open{display:flex}
#img-modal img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain}
#img-modal-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-info{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:12px 20px;border-radius:10px;text-align:center;white-space:nowrap}
.modal-info .mi-loc{font-size:15px;font-weight:700}
.modal-info .mi-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── 업로드 모달 ── */
#upload-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:24px}
#upload-modal.open{display:flex}
.upload-box{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
.upload-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.upload-header span{font-size:18px;font-weight:900;color:var(--accent)}
.upload-header button{background:var(--card2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.upload-header button:hover{color:var(--text)}

/* 드롭존 */
#drop-zone{border:2px dashed var(--border);border-radius:14px;min-height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:20px;position:relative;overflow:hidden}
#drop-zone:hover,#drop-zone.dragover{border-color:var(--accent);background:rgba(245,166,35,.05)}
#drop-zone.has-image{border-style:solid;border-color:var(--accent)}
.drop-hint{text-align:center;color:var(--muted);pointer-events:none}
.drop-hint .drop-icon{font-size:36px;margin-bottom:8px}
.drop-hint p{font-size:14px}
.drop-hint small{font-size:11px;opacity:.7}
#upload-preview{width:100%;max-height:220px;object-fit:contain;border-radius:10px;display:none}
.drop-clear{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center}
#drop-zone.has-image .drop-clear{display:flex}

/* 폼 그리드 */
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.uf-wrap{display:flex;flex-direction:column;gap:6px}
.uf-wrap label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
.uf-wrap textarea{padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;resize:vertical;min-height:72px;font-family:inherit;transition:border-color .2s}
.uf-wrap textarea:focus{border-color:var(--accent)}

/* 자동완성 */
.ac-wrap{position:relative}
.ac-wrap input{width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.ac-wrap input:focus{border-color:var(--accent)}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1E2235;border:1px solid var(--border);border-radius:10px;z-index:600;display:none;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ac-list.show{display:block}
.ac-item{padding:9px 14px;font-size:14px;cursor:pointer;transition:background .15s;border-radius:8px;margin:2px}
.ac-item:hover,.ac-item.active{background:rgba(245,166,35,.15);color:var(--accent)}

/* 라디오 */
.radio-group{display:flex;gap:16px}
.radio-opt{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;padding:8px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;transition:border-color .2s}
.radio-opt input[type=radio]{accent-color:var(--accent)}
.radio-opt:has(input:checked){border-color:var(--accent);background:rgba(245,166,35,.1)}

/* 보드판 토글 */
.board-toggle{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .2s;margin-bottom:20px;user-select:none}
.board-toggle:has(input:checked){border-color:var(--accent);background:rgba(245,166,35,.08)}
.board-toggle input[type=checkbox]{accent-color:var(--accent);width:18px;height:18px;cursor:pointer}
.board-toggle .bt-label{font-size:14px;font-weight:600}
.board-toggle .bt-sub{font-size:11px;color:var(--muted)}

/* 업로드 진행 */
.progress-wrap{margin-bottom:16px;display:none}
.progress-bar{background:var(--card2);border-radius:99px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .2s;width:0%}
.progress-label{font-size:12px;color:var(--muted);margin-top:6px;text-align:center}

/* 버튼 업로드 */
.btn-upload{background:var(--accent);color:#000;font-weight:900}
.btn-upload:hover{opacity:.9}
.btn-upload:disabled{opacity:.4;cursor:not-allowed}

@media(max-width:520px){
  .upload-grid{grid-template-columns:1fr}
  .uf-wrap[style*="1/-1"]{grid-column:1}
}

/* ── 로딩 ── */
.loading{text-align:center;padding:60px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:15px}

/* ── 동기화 상태 ── */
.sync-bar{background:rgba(92,107,192,.15);border-bottom:1px solid rgba(92,107,192,.3);padding:8px 24px;font-size:12px;color:#AAB0E0;display:none;align-items:center;gap:8px}
.sync-bar.show{display:flex}

@media(max-width:768px){
  .topbar{padding:0 12px;gap:8px}
  .content{padding:12px}
  th:nth-child(1),td:nth-child(1){display:none}
  .modal-info{white-space:normal;width:calc(100% - 48px)}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">🏗️</div>
    <div class="login-title">펀치매니저</div>
    <div class="login-sub">현장 코드로 로그인해주세요</div>
    <div class="field-wrap">
      <div class="field-label">현장 코드</div>
      <input class="field-input" id="inp-code" placeholder="6자리 코드 입력" maxlength="6"
        style="text-transform:uppercase;letter-spacing:4px;font-size:20px;font-weight:900;text-align:center">
    </div>
    <div class="field-wrap">
      <div class="field-label">이름</div>
      <input class="field-input" id="inp-name" placeholder="예: 홍길동">
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">로그인</button>
    <div class="error-box" id="login-error" style="display:none"></div>
  </div>
</div>

<!-- 메인 -->
<div id="main-screen">
  <div class="sync-bar" id="sync-bar">
    <div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>
    <span id="sync-msg">데이터 불러오는 중...</span>
  </div>
  <div class="topbar">
    <div class="topbar-title">📋 펀치매니저</div>
    <div class="topbar-site" id="tb-site"></div>
    <div class="topbar-code" id="tb-code"></div>
    <button class="btn-sm btn-excel" onclick="exportExcel()">📊 엑셀</button>
    <button class="btn-sm btn-upload" onclick="openUploadModal()">📤 업로드</button>
    <button class="btn-sm" style="background:var(--card2);color:var(--muted)" onclick="window.open('https://lulee4132.github.io/punchmanager-releases/사진대지_생성기.html','_blank')" title="사진대지 생성기">🎨 사진대지</button>
    <button class="btn-sm btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="content">
    <!-- 통계 -->
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="st-total" style="color:var(--text)">-</div><div class="stat-lbl">전체</div></div>
      <div class="stat-card"><div class="stat-num" id="st-open" style="color:#AAB0E0">-</div><div class="stat-lbl">진행중</div></div>
      <div class="stat-card"><div class="stat-num" id="st-done" style="color:var(--green)">-</div><div class="stat-lbl">완료</div></div>
      <div class="stat-card"><div class="stat-num" id="st-users" style="color:var(--accent)">-</div><div class="stat-lbl">참여인원</div></div>
    </div>

    <!-- 필터 -->
    <div class="filters">
      <span class="filter-label">필터</span>
      <select class="filter-select" id="f-dong" onchange="applyFilter()"><option value="">전체 동</option></select>
      <select class="filter-select" id="f-gj" onchange="applyFilter()"><option value="">전체 공종</option></select>
      <select class="filter-select" id="f-status" onchange="applyFilter()">
        <option value="">전체 상태</option>
        <option value="active">진행중</option>
        <option value="done">완료</option>
      </select>
      <select class="filter-select" id="f-user" onchange="applyFilter()"><option value="">전체 인원</option></select>
      <input class="filter-input" id="f-search" placeholder="🔍 위치, 내용 검색" oninput="applyFilter()">
      <button class="btn-sm" style="background:var(--card2);color:var(--muted)" onclick="resetFilter()">초기화</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-count" id="tbl-count">0개</span>
        <button class="btn-sm btn-danger" id="btn-delete-all" style="display:none" onclick="confirmDeleteAll()">🗑️ 현장 데이터 전체 삭제</button>
      </div>
      <div id="tbl-body">
        <div class="loading"><div class="spinner"></div>데이터 불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<!-- 업로드 모달 -->
<div id="upload-modal" onclick="closeUploadModal(event)">
  <div class="upload-box">
    <div class="upload-header">
      <span>📤 항목 업로드</span>
      <button onclick="closeUploadModal()">✕</button>
    </div>

    <!-- 드롭존 -->
    <div id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="onFileSelected(event)">
      <img id="upload-preview">
      <button class="drop-clear" onclick="clearPhoto(event)" title="사진 제거">✕</button>
      <div class="drop-hint" id="drop-hint">
        <div class="drop-icon">📷</div>
        <p>사진을 드래그하거나 클릭해서 선택</p>
        <small>Ctrl+V 붙여넣기도 가능합니다</small>
      </div>
    </div>

    <!-- 보드판 토글 -->
    <label class="board-toggle">
      <input type="checkbox" id="chk-board" checked>
      <div>
        <div class="bt-label">📋 동산보드판 넣기</div>
        <div class="bt-sub">사진에 공사명·공종·위치·내용·일자 보드를 합성합니다</div>
      </div>
    </label>

    <!-- 폼 -->
    <div class="upload-grid">
      <div class="uf-wrap">
        <label>동 <span style="color:var(--accent)">*</span></label>
        <div class="ac-wrap">
          <input id="ac-dong" placeholder="동 선택 또는 입력" autocomplete="off"
            oninput="acFilter('dong')" onfocus="acOpen('dong')" onkeydown="acKey(event,'dong')">
          <div class="ac-list" id="ac-list-dong"></div>
        </div>
      </div>
      <div class="uf-wrap">
        <label>호수</label>
        <div class="ac-wrap">
          <input id="ac-ho" placeholder="예: 101" autocomplete="off"
            oninput="acFilter('ho')" onfocus="acOpen('ho')" onkeydown="acKey(event,'ho')">
          <div class="ac-list" id="ac-list-ho"></div>
        </div>
      </div>
      <div class="uf-wrap">
        <label>세부위치 (실)</label>
        <div class="ac-wrap">
          <input id="ac-room" placeholder="예: 욕실, 주방" autocomplete="off"
            oninput="acFilter('room')" onfocus="acOpen('room')" onkeydown="acKey(event,'room')">
          <div class="ac-list" id="ac-list-room"></div>
        </div>
      </div>
      <div class="uf-wrap">
        <label>공종 <span style="color:var(--accent)">*</span></label>
        <div class="ac-wrap">
          <input id="ac-gj" placeholder="공종 선택 또는 입력" autocomplete="off"
            oninput="acFilter('gj')" onfocus="acOpen('gj')" onkeydown="acKey(event,'gj')">
          <div class="ac-list" id="ac-list-gj"></div>
        </div>
      </div>
      <div class="uf-wrap" style="grid-column:1/-1">
        <label>상세위치</label>
        <div class="ac-wrap">
          <input id="ac-wichi" placeholder="예: 현관 문틀 상단" autocomplete="off"
            oninput="acFilter('wichi')" onfocus="acOpen('wichi')" onkeydown="acKey(event,'wichi')">
          <div class="ac-list" id="ac-list-wichi"></div>
        </div>
      </div>
      <div class="uf-wrap" style="grid-column:1/-1">
        <label>내용</label>
        <textarea id="uf-content" placeholder="하자/작업 내용을 입력하세요"></textarea>
      </div>
      <div class="uf-wrap" style="grid-column:1/-1">
        <label>상태</label>
        <div class="radio-group">
          <label class="radio-opt"><input type="radio" name="uf-status" value="active" checked> 진행중</label>
          <label class="radio-opt"><input type="radio" name="uf-status" value="done"> 완료</label>
        </div>
      </div>
    </div>

    <!-- 진행 -->
    <div class="progress-wrap" id="progress-wrap">

<script>
// ── Firebase 설정 ──
const firebaseConfig = {

  authDomain: "punch-manager-1415a.firebaseapp.com",
  projectId: "punch-manager-1415a",
  storageBucket: "punch-manager-1415a.firebasestorage.app",
  messagingSenderId: "310410880464",

  measurementId: "G-QMWHYFR3Q7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let allPhotos = [];
let currentSiteCode = '';
let currentSiteName = '';
let currentUserName = '';
let isAdmin = false;

// ── 로그인 ──
document.getElementById('inp-code').addEventListener('input', function() {
  this.value = this.value.toUpperCase();
});
document.getElementById('inp-code').addEventListener('keydown', e => {

});

async function doLogin() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  const name = document.getElementById('inp-name').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!code || code.length !== 6) { showErr('현장 코드 6자리를 입력해주세요'); return; }
  if (!name) { showErr('이름을 입력해주세요'); return; }

  btn.disabled = true;
  btn.textContent = '확인 중...';
  errEl.style.display = 'none';

  try {
    const doc = await db.collection('sites').doc(code).get();
    if (!doc.exists) { showErr('존재하지 않는 현장 코드입니다'); btn.disabled=false; btn.textContent='로그인'; return; }

    const data = doc.data();
    currentSiteCode = code;
    currentSiteName = data.siteName;
    currentUserName = name;
    isAdmin = data.adminName === name;

    sessionStorage.setItem('pm_code', code);
    sessionStorage.setItem('pm_name', name);
    sessionStorage.setItem('pm_site', data.siteName);
    sessionStorage.setItem('pm_admin', isAdmin ? '1' : '0');

    showMain();
  } catch(e) {
    showErr('연결 오류: ' + e.message);
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function showErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = '로그인';
}

function doLogout() {
  sessionStorage.clear();
  location.reload();
}

// ── 메인 화면 ──
function showMain() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('tb-site').textContent = currentSiteName;
  document.getElementById('tb-code').textContent = currentSiteCode;
  if (isAdmin) document.getElementById('btn-delete-all').style.display = 'block';
  loadPhotos();
}

async function loadPhotos() {
  setSyncBar(true, '데이터 불러오는 중...');
  try {
    const snap = await db.collection('sites').doc(currentSiteCode)
        .collection('photos').orderBy('ts', 'desc').get();

    // ts 기준 중복 제거 - 같은 ts면 status가 'done'인 것 우선
    const rawPhotos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const tsMap = new Map();
    for (const p of rawPhotos) {
      const key = p.ts;
      if (!tsMap.has(key)) {
        tsMap.set(key, p);
      } else {
        const existing = tsMap.get(key);
        // done 상태 우선, 같으면 최신 문서 ID 우선
        if (p.status === 'done' && existing.status !== 'done') {
          tsMap.set(key, p);
        }
      }
    }
    allPhotos = Array.from(tsMap.values());
    buildFilters();
    applyFilter();
    updateStats();
    setSyncBar(false);
  } catch(e) {
    setSyncBar(false);
    document.getElementById('tbl-body').innerHTML =
      `<div class="empty">데이터를 불러올 수 없습니다<br><small style="color:var(--muted)">${e.message}</small></div>`;
  }
}

function setSyncBar(show, msg = '') {
  const bar = document.getElementById('sync-bar');
  if (show) { bar.classList.add('show'); document.getElementById('sync-msg').textContent = msg; }
  else { bar.classList.remove('show'); }
}

function buildFilters() {
  const dongs = [...new Set(allPhotos.map(p => p.dong).filter(Boolean))].sort();
  const gjs = [...new Set(allPhotos.map(p => p.gj).filter(Boolean))].sort();
  const users = [...new Set(allPhotos.map(p => p.userName).filter(Boolean))].sort();

  setOptions('f-dong', dongs, '전체 동');
  setOptions('f-gj', gjs, '전체 공종');
  setOptions('f-user', users, '전체 인원');
}

function setOptions(id, arr, placeholder) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    arr.map(v => `<option value="${v}"${v===cur?' selected':''}>${v}</option>`).join('');
}

function applyFilter() {
  const dong = document.getElementById('f-dong').value;
  const gj = document.getElementById('f-gj').value;
  const status = document.getElementById('f-status').value;
  const user = document.getElementById('f-user').value;
  const search = document.getElementById('f-search').value.toLowerCase();

  const filtered = allPhotos.filter(p => {
    if (dong && p.dong !== dong) return false;
    if (gj && p.gj !== gj) return false;
    if (status && p.status !== status) return false;
    if (user && p.userName !== user) return false;
    if (search) {
      const hay = `${p.wichi} ${p.content} ${p.dong} ${p.gj} ${p.userName}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderTable(filtered);
  document.getElementById('tbl-count').textContent = `${filtered.length}개`;
}

function resetFilter() {
  document.getElementById('f-dong').value = '';
  document.getElementById('f-gj').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-user').value = '';
  document.getElementById('f-search').value = '';
  applyFilter();
}

function updateStats() {
  const total = allPhotos.length;
  const open = allPhotos.filter(p => p.status === 'active').length;
  const done = allPhotos.filter(p => p.status === 'done').length;
  const users = new Set(allPhotos.map(p => p.userName).filter(Boolean)).size;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-open').textContent = open;
  document.getElementById('st-done').textContent = done;
  document.getElementById('st-users').textContent = users;
}

function renderTable(photos) {
  if (!photos.length) {
    document.getElementById('tbl-body').innerHTML = '<div class="empty">해당하는 항목이 없습니다</div>';
    return;
  }

  const rows = photos.map(p => {
    const thumb = p.url
      ? `<img class="thumb" src="${p.url}" onclick="openImg('${p.url}','${esc(p.wichi)}','${esc(p.gj+' · '+p.date+' · '+p.userName)}')" loading="lazy">`
      : `<div class="no-thumb">📷</div>`;
    const isOwn = p.userName === currentUserName;
    let badge;
    if (isOwn) {
      badge = p.status === 'done'
        ? `<span class="badge badge-done badge-click" onclick="toggleStatus('${p.id}')" title="클릭→진행중">완료</span>`
        : `<span class="badge badge-open badge-click" onclick="toggleStatus('${p.id}')" title="클릭→완료">진행중</span>`;
    } else {
      badge = p.status === 'done'
        ? `<span class="badge badge-done">완료</span>`
        : `<span class="badge badge-open">진행중</span>`;
    }
    const delBtn = isAdmin
      ? `<td><button class="btn-del-row" onclick="deleteRow('${p.id}',this)">🗑️ 삭제</button></td>`
      : '';
    return `<tr id="row-${p.id}">
      <td>${thumb}</td>
      <td>${p.dong || '-'}<br><small style="color:var(--muted)">${p.ho ? p.ho+'호' : ''} ${p.room || ''}</small></td>
      <td>${p.gj || '-'}</td>
      <td>${p.wichi || '-'}</td>
      <td style="max-width:200px;white-space:normal">${p.content || '-'}</td>
      <td>${badge}</td>
      <td>${p.date || '-'}<br><span class="user-tag">${p.userName || '-'}</span></td>
      ${delBtn}
    </tr>`;
  }).join('');

  document.getElementById('tbl-body').innerHTML = `
    <table>
      <thead><tr>
        <th>사진</th><th>위치</th><th>공종</th><th>상세위치</th><th>내용</th><th>상태</th><th>일자/작성자</th>${isAdmin ? '<th></th>' : ''}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ════════════════════════════════════════════════
// ── 업로드 모달 ──
// ════════════════════════════════════════════════

// 자동완성 소스 (allPhotos에서 추출)
const acSources = { dong: [], ho: [], room: [], gj: [], wichi: [] };
const acActiveIdx = {};

function buildAcSources() {
  acSources.dong  = [...new Set(allPhotos.map(p => p.dong).filter(Boolean))].sort();
  acSources.ho    = [...new Set(allPhotos.map(p => p.ho).filter(Boolean))].sort();
  acSources.room  = [...new Set(allPhotos.map(p => p.room).filter(Boolean))].sort();
  acSources.gj    = [...new Set(allPhotos.map(p => p.gj).filter(Boolean))].sort();
  acSources.wichi = [...new Set(allPhotos.map(p => p.wichi).filter(Boolean))].sort();
}

function acRender(field, items) {
  const list = document.getElementById('ac-list-' + field);
  acActiveIdx[field] = -1;
  if (!items.length) { list.classList.remove('show'); return; }
  list.innerHTML = items.map(v =>
    `<div class="ac-item" data-val="${v.replace(/"/g,'&quot;')}" onmousedown="acPick('${field}',this)">${v}</div>`
  ).join('');
  list.classList.add('show');
}

function acOpen(field) {
  const val = document.getElementById('ac-' + field).value.trim().toLowerCase();
  const items = val
    ? acSources[field].filter(s => s.toLowerCase().includes(val))
    : acSources[field];
  acRender(field, items);
}

function acFilter(field) { acOpen(field); }

function acClose(field) {
  document.getElementById('ac-list-' + field).classList.remove('show');
}

function acPick(field, el) {
  document.getElementById('ac-' + field).value = el.dataset.val;
  acClose(field);
}

function acKey(e, field) {
  const list = document.getElementById('ac-list-' + field);
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('show') || !items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActiveIdx[field] = Math.min((acActiveIdx[field] ?? -1) + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActiveIdx[field] = Math.max((acActiveIdx[field] ?? 0) - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const idx = acActiveIdx[field] ?? -1;
    if (idx >= 0 && items[idx]) acPick(field, items[idx]);
    else acClose(field);
    return;
  } else if (e.key === 'Escape') {
    acClose(field); return;
  } else return;

  items.forEach((el, i) => el.classList.toggle('active', i === acActiveIdx[field]));
  items[acActiveIdx[field]]?.scrollIntoView({ block: 'nearest' });
}

// 바깥 클릭 시 자동완성 닫기
document.addEventListener('click', e => {
  ['dong','ho','room','gj','wichi'].forEach(f => {
    const inp  = document.getElementById('ac-' + f);
    const list = document.getElementById('ac-list-' + f);
    if (inp && !inp.contains(e.target) && list && !list.contains(e.target)) acClose(f);
  });
});

function openUploadModal() {
  buildAcSources();
  resetUploadForm();
  document.getElementById('upload-modal').classList.add('open');
  document.addEventListener('paste', onPaste);
}

function closeUploadModal(e) {
  if (e && e.target !== document.getElementById('upload-modal')) return;
  _closeUploadModal();
}

function _closeUploadModal() {
  document.getElementById('upload-modal').classList.remove('open');
  document.removeEventListener('paste', onPaste);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('upload-modal').classList.contains('open'))
    _closeUploadModal();
});

// ── 사진 처리 ──
let uploadFile = null;

function setPhotoFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    showUploadErr('이미지 파일만 업로드 가능합니다.'); return;
  }
  uploadFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const preview = document.getElementById('upload-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
    document.getElementById('drop-hint').style.display = 'none';
    document.getElementById('drop-zone').classList.add('has-image');
  };
  reader.readAsDataURL(file);
}

function clearPhoto(e) {
  e.stopPropagation();
  uploadFile = null;
  const preview = document.getElementById('upload-preview');
  preview.src = '';
  preview.style.display = 'none';
  document.getElementById('drop-hint').style.display = 'flex';
  document.getElementById('drop-zone').classList.remove('has-image');
  document.getElementById('file-input').value = '';
}

function onFileSelected(e) { if (e.target.files[0]) setPhotoFile(e.target.files[0]); }

function onDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('dragover');
}
function onDragLeave() {
  document.getElementById('drop-zone').classList.remove('dragover');
}
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) setPhotoFile(file);
}

// Ctrl+V 클립보드 붙여넣기
function onPaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      setPhotoFile(item.getAsFile());
      break;
    }
  }
}

// ── 폼 초기화 ──
function resetUploadForm() {
  uploadFile = null;
  const preview = document.getElementById('upload-preview');
  preview.src = '';
  preview.style.display = 'none';
  document.getElementById('drop-hint').style.display = 'flex';
  document.getElementById('drop-zone').classList.remove('has-image','dragover');
  document.getElementById('file-input').value = '';
  ['dong','ho','room','gj','wichi'].forEach(f => {
    document.getElementById('ac-' + f).value = '';
    acClose(f);
  });
  document.getElementById('uf-content').value = '';
  document.querySelector('input[name="uf-status"][value="active"]').checked = true;
  document.getElementById('chk-board').checked = true;
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('upload-error').style.display = 'none';
  const btn = document.getElementById('btn-upload-submit');
  btn.disabled = false;
  btn.textContent = '📤 업로드';
}

function showUploadErr(msg) {
  const el = document.getElementById('upload-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── 동산보드판 합성 ──
async function compositeBoard(file, { dong, ho, room, gj, content, wichi }) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        // 16:10 크롭
        const srcW = img.width, srcH = img.height;
        const targetRatio = 16 / 10;
        const srcRatio = srcW / srcH;
        let cropW, cropH, cropX, cropY;
        if (srcRatio > targetRatio) {
          cropH = srcH; cropW = srcH * targetRatio;
          cropX = (srcW - cropW) / 2; cropY = 0;
        } else {
          cropW = srcW; cropH = srcW / targetRatio;
          cropX = 0; cropY = (srcH - cropH) / 2;
        }

        // 해상도 제한 (긴 변 1600px)
        let outW = Math.round(cropW), outH = Math.round(cropH);
        const maxSide = 1600;
        if (outW > maxSide || outH > maxSide) {
          const s = maxSide / Math.max(outW, outH);
          outW = Math.round(outW * s);
          outH = Math.round(outH * s);
        }

        const canvas = document.createElement('canvas');
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext('2d');

        // 크롭된 사진 그리기
        ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, outW, outH);

        const W = outW, H = outH;

        // ── 화이트보드 그리기 ──
        const siteName = currentSiteName || '';
        const now = new Date();
        const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

        // 위치: 동+호+세부위치 결합 (Flutter getWichi()와 동일)
        // ho가 이미 "호"로 끝나면 그대로, 아니면 "호" 붙임
        const hoFormatted = ho ? (ho.endsWith('호') ? ho : ho + '호') : '';
        const wichiParts = [dong, hoFormatted, room].filter(Boolean).join(' ');

        const rows = [
          ['공사명', siteName || '—'],
          ['공 종',  gj || '—'],
          ['위 치',  wichiParts || '—'],
          ['내 용',  content || '—'],
          ['일 자',  dateStr],
        ];

        // 보드 크기 계산 (Flutter 앱과 동일: 행높이 = H*6.2%, 총 31%)
        const rowH = H * 0.062;
        const boardH = rowH * 5;
        const fontSize = rowH * 0.60;
        const hPad = rowH * 0.15;
        const strokeW = W * 0.001;

        // 레이블 최대 폭 측정
        ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
        let maxLblW = 0;
        for (const r of rows) {
          const m = ctx.measureText(r[0]);
          if (m.width > maxLblW) maxLblW = m.width;
        }
        const labelW = maxLblW + hPad * 2;

        // 값 최대 폭 측정
        ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
        let maxValW = 0;
        for (const r of rows) {
          const m = ctx.measureText(r[1]);
          if (m.width > maxValW) maxValW = m.width;
        }
        let boardW = labelW + maxValW + hPad * 2;
        boardW = Math.max(W * 0.25, Math.min(W * 0.70, boardW));

        // 보드 위치: 좌측 하단
        const bx = 0, by = H - boardH;

        // 흰 배경
        ctx.fillStyle = 'rgba(255,255,255,0.97)';
        ctx.fillRect(bx, by, boardW, boardH);

        // 외곽선
        ctx.strokeStyle = '#888888';
        ctx.lineWidth = strokeW;
        ctx.strokeRect(bx, by, boardW, boardH);

        for (let i = 0; i < rows.length; i++) {
          const y = by + rowH * i;

          // 행 구분선
          if (i > 0) {
            ctx.strokeStyle = '#CCCCCC';
            ctx.lineWidth = strokeW * 0.7;
            ctx.beginPath();
            ctx.moveTo(bx, y); ctx.lineTo(bx + boardW, y);
            ctx.stroke();
          }

          // 레이블 배경
          ctx.fillStyle = '#EEEEEE';
          ctx.fillRect(bx, y, labelW, rowH);

          // 세로 구분선
          ctx.strokeStyle = '#CCCCCC';
          ctx.lineWidth = strokeW * 0.7;
          ctx.beginPath();
          ctx.moveTo(bx + labelW, y); ctx.lineTo(bx + labelW, y + rowH);
          ctx.stroke();

          // 레이블 텍스트
          ctx.fillStyle = '#222222';
          ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
          ctx.textBaseline = 'middle';
          ctx.fillText(rows[i][0], bx + hPad, y + rowH / 2);

          // 값 텍스트
          ctx.fillStyle = '#111111';
          ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
          // 클리핑: 값이 넘치지 않도록
          ctx.save();
          ctx.beginPath();
          ctx.rect(bx + labelW, y, boardW - labelW, rowH);
          ctx.clip();
          ctx.fillText(rows[i][1], bx + labelW + hPad, y + rowH / 2);
          ctx.restore();
        }

        // ── 워터마크: 우측 상단에 이름 ──
        if (currentUserName) {
          const wmFontSize = W * 0.025;
          const wmPad = W * 0.015;
          ctx.font = `bold ${wmFontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
          ctx.textBaseline = 'top';
          ctx.shadowColor = 'rgba(0,0,0,0.7)';
          ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1; ctx.shadowBlur = 3;
          ctx.fillStyle = '#FFFFFF';
          const wmW = ctx.measureText(currentUserName).width;
          ctx.fillText(currentUserName, W - wmW - wmPad, wmPad);
          ctx.shadowColor = 'transparent';
        }

        // PNG로 변환
        canvas.toBlob(blob => {
          resolve(new File([blob], 'composited.png', { type: 'image/png' }));
        }, 'image/png', 1.0);

      } catch(err) { reject(err); }
    };
    img.onerror = () => reject(new Error('이미지 로드 실패'));
    img.src = URL.createObjectURL(file);
  });
}

// ── 실제 업로드 ──
async function doUpload() {
  const dong    = document.getElementById('ac-dong').value.trim();
  const gj      = document.getElementById('ac-gj').value.trim();
  const ho      = document.getElementById('ac-ho').value.trim();
  const room    = document.getElementById('ac-room').value.trim();
  const wichi   = document.getElementById('ac-wichi').value.trim();
  const content = document.getElementById('uf-content').value.trim();
  const status  = document.querySelector('input[name="uf-status"]:checked').value;

  document.getElementById('upload-error').style.display = 'none';
  if (!dong) { showUploadErr('동은 필수 항목입니다.'); return; }
  if (!gj)   { showUploadErr('공종은 필수 항목입니다.'); return; }

  const btn = document.getElementById('btn-upload-submit');
  btn.disabled = true;
  btn.textContent = '업로드 중...';

  const ts = Date.now();
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  try {
    let downloadUrl = '';

    if (uploadFile) {
      const wrap = document.getElementById('progress-wrap');
      const fill = document.getElementById('progress-fill');
      const lbl  = document.getElementById('progress-label');
      wrap.style.display = 'block';

      // 보드판 합성 여부
      let fileToUpload = uploadFile;
      const useBoard = document.getElementById('chk-board').checked;
      if (useBoard) {
        lbl.textContent = '보드판 합성 중...';
        fill.style.width = '5%';
        fileToUpload = await compositeBoard(uploadFile, { dong, ho, room, gj, content, wichi });
      }

      const ref  = storage.ref(`sites/${currentSiteCode}/photos/photo_${ts}.png`);
      const task = ref.put(fileToUpload);

      downloadUrl = await new Promise((resolve, reject) => {
        task.on('state_changed',
          snap => {
            const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
            fill.style.width = pct + '%';
            lbl.textContent = `사진 업로드 중... ${pct}%`;
          },
          reject,
          async () => {
            lbl.textContent = '메타데이터 저장 중...';
            resolve(await ref.getDownloadURL());
          }
        );
      });
    }

    const docData = {
      url: downloadUrl,
      dong, ho, room, gj, content, wichi,
      date: dateStr,
      ts,
      userName: currentUserName,
      status,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    };

    await db.collection('sites').doc(currentSiteCode)
        .collection('photos').doc(String(ts)).set(docData);

    // 목록에 즉시 반영
    allPhotos.unshift({ id: String(ts), ...docData });
    buildFilters();
    applyFilter();
    updateStats();

    btn.textContent = '✅ 완료!';
    setTimeout(() => _closeUploadModal(), 800);

  } catch(e) {
    showUploadErr('업로드 실패: ' + e.message);
    btn.disabled = false;
    btn.textContent = '📤 업로드';
    document.getElementById('progress-wrap').style.display = 'none';
  }
}

// ── 상태 토글 (자기가 올린 것만) ──
async function toggleStatus(photoId) {
  const photo = allPhotos.find(p => p.id === photoId);
  if (!photo || photo.userName !== currentUserName) return;

  const newStatus = photo.status === 'done' ? 'active' : 'done';
  const badge = document.querySelector(`#row-${photoId} .badge`);
  if (badge) {
    badge.textContent = '변경 중...';
    badge.style.opacity = '0.5';
  }

  try {
    await db.collection('sites').doc(currentSiteCode)
        .collection('photos').doc(photoId).update({ status: newStatus });

    photo.status = newStatus;
    updateStats();
    applyFilter();
  } catch(e) {
    alert('상태 변경 실패: ' + e.message);
    if (badge) { badge.style.opacity = '1'; }
  }
}

// ── 개별 삭제 (관리자) ──
async function deleteRow(photoId, btn) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;

  btn.disabled = true;
  btn.textContent = '삭제 중...';
  const row = document.getElementById('row-' + photoId);
  if (row) row.classList.add('row-deleting');

  try {
    await db.collection('sites').doc(currentSiteCode)
        .collection('photos').doc(photoId).delete();
    // Storage 사진도 삭제 시도 (없어도 무시)
    try {
      await storage.ref(`sites/${currentSiteCode}/photos/photo_${photoId}.png`).delete();
    } catch(_) {}

    allPhotos = allPhotos.filter(p => p.id !== photoId);
    buildFilters();
    updateStats();

    if (row) {
      row.style.transition = 'opacity .3s';
      row.style.opacity = '0';
      setTimeout(() => {
        row.remove();
        const tbody = document.querySelector('#tbl-body tbody');
        if (tbody && !tbody.children.length) {
          document.getElementById('tbl-body').innerHTML = '<div class="empty">해당하는 항목이 없습니다</div>';
        }
        document.getElementById('tbl-count').textContent =
          `${document.querySelectorAll('#tbl-body tbody tr').length}개`;
      }, 300);
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '🗑️ 삭제';
    if (row) row.classList.remove('row-deleting');
    alert('삭제 실패: ' + e.message);
  }
}

// ── 전체 삭제 ──
async function confirmDeleteAll() {
  if (!confirm(`⚠️ ${currentSiteName} 현장의 모든 데이터를 삭제합니다.\n이 작업은 되돌릴 수 없습니다.\n\n정말 삭제하시겠습니까?`)) return;
  if (!confirm('마지막 확인: 정말 삭제하시겠습니까?')) return;

  setSyncBar(true, '데이터 삭제 중...');
  try {
    const snap = await db.collection('sites').doc(currentSiteCode)
        .collection('photos').get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    allPhotos = [];
    applyFilter();
    updateStats();
    setSyncBar(false);
    alert('삭제 완료됐습니다.');
  } catch(e) {
    setSyncBar(false);
    alert('삭제 실패: ' + e.message);
  }
}

// ── 자동 로그인 (세션) ──
window.onload = () => {
  const code = sessionStorage.getItem('pm_code');
  const name = sessionStorage.getItem('pm_name');
  const site = sessionStorage.getItem('pm_site');
  const admin = sessionStorage.getItem('pm_admin');
  if (code && name) {
    currentSiteCode = code;
    currentUserName = name;
    currentSiteName = site || '';
    isAdmin = admin === '1';
    document.getElementById('inp-code').value = code;
    document.getElementById('inp-name').value = name;
    showMain();
  }
};
