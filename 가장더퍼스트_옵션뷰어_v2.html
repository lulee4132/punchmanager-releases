<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>가장더퍼스트 옵션 현황 뷰어</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:rgba(56,104,216,.15)}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#222;background:#f5f6f8;-webkit-text-size-adjust:100%}
body{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
button{font-family:inherit}
input,select{font-family:inherit;font-size:16px}

header{padding:10px 14px;background:#1f2a44;color:#fff;flex:0 0 auto;display:flex;align-items:center;gap:10px;min-height:48px}
header h1{font-size:15px;margin:0;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .stats{font-size:11px;opacity:.8;white-space:nowrap}
.menu-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;padding:0;position:relative}
.menu-btn:active{background:rgba(255,255,255,.25)}
.save-btn{font-size:17px}
.chip-count{background:#e0a800;color:#1f2a44;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;display:none}
.chip-count.show{display:inline-block}

/* Save dialog (PC) */
.save-dialog-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.save-dialog-bg.show{display:flex}
.save-dialog{background:#fff;border-radius:10px;padding:18px;max-width:340px;width:100%;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.save-dialog h3{margin:0 0 14px 0;font-size:15px;color:#1f2a44}
.save-dialog p{margin:0 0 14px 0;font-size:13px;color:#666;line-height:1.5}
.save-dialog .btns{display:flex;flex-direction:column;gap:8px}
.save-dialog button{padding:11px;border:1px solid #ccd;border-radius:6px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#333}
.save-dialog button.primary{background:#3868d8;color:#fff;border-color:#3868d8}
.save-dialog button:active{opacity:.8}
.save-dialog .toast{font-size:12px;color:#22a06b;text-align:center;padding-top:6px;display:none}
.save-dialog .toast.show{display:block}

main{flex:1;display:flex;min-height:0;position:relative;overflow:hidden}
.left{flex:0 0 340px;background:#fff;border-right:1px solid #e3e6ec;display:flex;flex-direction:column;min-height:0;transition:margin-left .22s ease-out}
.left.collapsed{margin-left:-340px}
.right{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.overlay.show{display:block}

.section-title{padding:12px 14px;font-size:12px;font-weight:700;color:#555;background:#f0f2f6;border-bottom:1px solid #e3e6ec;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.drawer-close{display:none;background:none;border:none;font-size:22px;color:#666;cursor:pointer;padding:0;width:30px;height:30px;line-height:1}

.opt-search{padding:10px;border-bottom:1px solid #eee}
.opt-search input{width:100%;padding:9px 12px;border:1px solid #ccd;border-radius:6px;outline:none}
.opt-search input:focus{border-color:#3868d8}

/* Selected option list (A, B, C...) */
.selected-list{padding:8px 10px;border-bottom:1px solid #eee;background:#fafbfd}
.sel-empty{font-size:12px;color:#999;font-style:italic;padding:4px 2px}
.sel-item{display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:12px;line-height:1.3}
.sel-label{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--c);color:#fff;font-weight:800;font-size:12px;flex-shrink:0}
.sel-text{flex:1;min-width:0;color:#333;word-break:break-word}
.sel-text .cat{color:#777;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;display:block;line-height:1.2;margin-bottom:1px}
.sel-text .val{font-weight:600}
.sel-x{background:#eef0f4;border:none;width:24px;height:24px;border-radius:50%;cursor:pointer;color:#666;font-size:16px;line-height:1;flex-shrink:0;padding:0}
.sel-x:active{background:#ddd}

/* Formula bar */
.formula-wrap{padding:10px;border-bottom:1px solid #eee;background:#fff6e0}
.formula-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.formula-label{font-size:10px;font-weight:700;color:#8a5a00;text-transform:uppercase;letter-spacing:.5px;flex:1}
.group-btn{padding:5px 12px;border:1px solid #d6b870;border-radius:14px;background:#fff;color:#8a5a00;font-size:11px;font-weight:700;cursor:pointer;min-height:28px}
.group-btn:active{background:#fff3d6}
.group-btn.active{background:#8a5a00;color:#fff;border-color:#8a5a00}
.group-btn:disabled{opacity:.4;cursor:not-allowed}
.formula{background:#fff;border:1px solid #e8d8a8;border-radius:6px;padding:10px;font-size:15px;line-height:1.8;display:flex;flex-wrap:wrap;align-items:center;gap:4px;min-height:44px;word-break:break-all}
.formula.pick-mode{background:#fffbe0;border-color:#e0a800;border-style:dashed}
.f-var{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--c);color:#fff;font-weight:800;font-size:13px;cursor:default;user-select:none;flex-shrink:0}
.formula.pick-mode .f-var{cursor:pointer;transition:transform .1s}
.formula.pick-mode .f-var:active{transform:scale(.9)}
.f-var.picked{box-shadow:0 0 0 3px #e0a800}
.f-op{display:inline-block;padding:0 4px;font-size:17px;font-weight:700;color:#555;cursor:pointer;user-select:none;min-width:22px;text-align:center}
.f-op:active{color:#3868d8}
.f-paren{display:inline-block;padding:0 2px;font-size:17px;font-weight:700;color:#8a5a00;cursor:pointer;user-select:none}
.f-paren:active{color:#c33}
.f-group{display:inline-flex;align-items:center;gap:4px;padding:3px 4px;border-radius:8px;background:rgba(138,90,0,.08);cursor:pointer}
.f-group:active{background:rgba(138,90,0,.18)}
.formula-hint{font-size:10px;color:#8a5a00;margin-top:6px;line-height:1.4}

.opt-list{flex:1;overflow-y:auto;font-size:14px;-webkit-overflow-scrolling:touch}
.cat-box{border-bottom:1px solid #eef0f4}
.cat-h{padding:13px 14px;background:#fafbfd;font-weight:700;font-size:13px;color:#1f2a44;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;min-height:44px}
.cat-h:active{background:#e8edf8}
.cat-h .arrow{font-size:11px;opacity:.6;transition:transform .15s}
.cat-body{display:none;padding:2px 0 6px}
.cat-box.open .cat-body{display:block}
.cat-box.open .arrow{transform:rotate(90deg)}
.opt{padding:11px 14px 11px 28px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#333;min-height:42px}
.opt:active{background:#eef3ff}
.opt.active{font-weight:700;background:#f5f8ff;color:#3868d8}
.opt .cnt{margin-left:auto;font-size:11px;opacity:.7;background:rgba(0,0,0,.06);padding:2px 8px;border-radius:10px;font-weight:600}
.opt .cnt.zero{color:#c33;background:#fde}
.opt.disabled{opacity:.35;pointer-events:none}

.clear-btn{margin:10px;padding:11px;background:#eef0f4;border:none;border-radius:6px;cursor:pointer;font-size:13px;color:#444;font-weight:600;min-height:42px}
.clear-btn:active{background:#dde1ea}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e3e6ec;flex:0 0 auto}
.tab{padding:13px 18px;font-size:13px;font-weight:600;cursor:pointer;color:#666;border-bottom:3px solid transparent;flex:1;text-align:center;min-height:46px}
.tab.active{color:#3868d8;border-bottom-color:#3868d8}
.tab:active{background:#f6f8fc}

.view{flex:1;overflow:auto;background:#fff;display:none;-webkit-overflow-scrolling:touch}
.view.active{display:block}

#gridView{padding:12px}
.grid-info{margin-bottom:10px;font-size:12px;color:#555;line-height:1.7}
.grid-info b{color:#1f2a44}
.grid-info .hit-count{display:inline-block;background:#000;color:#fff;padding:2px 10px;border-radius:10px;font-weight:700;margin-left:4px}
.legend{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:6px;font-size:11px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.1)}

.grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
table.grid{border-collapse:separate;border-spacing:1px;background:#dfe2ea;font-size:11px;table-layout:fixed}
table.grid td{background:#fff;padding:0;height:30px;text-align:center;vertical-align:middle;white-space:nowrap;position:relative;overflow:hidden}
td.unit{cursor:pointer;font-family:Menlo,Consolas,monospace;font-size:10px;color:#333;overflow:hidden}
td.unit:active{z-index:5;box-shadow:inset 0 0 0 2px #e0a800}
td.unit.dim{opacity:.3}
td.unit.clicked{box-shadow:inset 0 0 0 3px #000}
td.unit.final .stripes{inset:3px}
td.unit.final::after{content:"";position:absolute;inset:0;border:3px solid #000;pointer-events:none;z-index:4}
td.unit.final.clicked::after{border-color:#e0a800}

.stripes{position:absolute;inset:0;display:flex;pointer-events:none}
.stripes div{flex:1;height:100%}
.unit-label{position:relative;z-index:1;font-weight:700;color:#000;text-shadow:0 0 2px rgba(255,255,255,.9),0 0 2px rgba(255,255,255,.9),0 0 2px rgba(255,255,255,.9)}

td.label{background:#f0f2f6;color:#555;font-weight:600;font-size:10px;padding:0 4px}
td.empty{background:transparent}

#unitView{padding:12px}
.unit-search{margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.unit-search label{font-size:13px;color:#555;font-weight:600}
.unit-search select,.unit-search input{padding:9px 10px;border:1px solid #ccd;border-radius:6px;outline:none;background:#fff;min-height:40px}
.unit-search input{flex:1;min-width:140px}
.unit-search select{min-width:90px}
.unit-search select:focus,.unit-search input:focus{border-color:#3868d8}
.unit-current{font-weight:700;color:#3868d8;font-size:16px;width:100%;padding-top:2px}
table.opts{border-collapse:collapse;width:100%;max-width:640px;font-size:14px;background:#fff}
table.opts th,table.opts td{border:1px solid #e0e3ea;padding:10px 12px;text-align:left;word-break:keep-all}
table.opts th{background:#f0f2f6;width:42%;font-weight:600;color:#333;font-size:13px}
table.opts td.has{color:#222}
table.opts td.match{background:#fff7d8;font-weight:700;color:#7a5500}
table.opts td.none{color:#bbb;font-style:italic}
.empty-msg{color:#999;font-size:14px;padding:30px 20px;text-align:center}

@media (max-width: 820px){
  header{padding:8px 12px;min-height:52px}
  header h1{font-size:14px}
  header .stats{display:none}
  main{overflow:visible}
  .left{position:fixed;top:0;left:0;bottom:0;width:86%;max-width:360px;z-index:100;margin-left:0;transform:translateX(-100%);transition:transform .22s ease-out;box-shadow:2px 0 18px rgba(0,0,0,.2)}
  .left.collapsed{margin-left:0;transform:translateX(-100%)}
  .left.open{transform:translateX(0)}
  .drawer-close{display:inline-flex;align-items:center;justify-content:center}
  .right{width:100%}
  #gridView{padding:8px}
  #unitView{padding:10px}
  .unit-search{gap:6px}
  .unit-search label{width:100%;margin-bottom:-4px}
  .unit-search select{flex:1;min-width:0}
  .unit-search input{flex:1 1 100%;min-width:0}
  table.opts th{width:45%;font-size:12px;padding:9px 10px}
  table.opts td{font-size:13px;padding:9px 10px}
  .tab{padding:13px 8px;font-size:12px}
}
</style>
</head>
<body>
<header>
  <button class="menu-btn" id="menuBtn" aria-label="옵션 메뉴">☰<span class="chip-count" id="chipCount"></span></button>
  <h1>가장더퍼스트 옵션 뷰어</h1>
  <span class="stats" id="stats"></span>
  <button class="menu-btn save-btn" id="saveBtn" aria-label="이미지 저장" title="골구도 이미지 저장">💾</button>
</header>
<div class="overlay" id="overlay"></div>
<div class="save-dialog-bg" id="saveDialog">
  <div class="save-dialog">
    <h3>골구도 이미지 저장</h3>
    <p>골구도를 이미지(PNG)로 저장합니다.</p>
    <div class="btns">
      <button class="primary" id="copyClipBtn">📋 클립보드에 복사</button>
      <button id="downloadBtn">💾 파일로 저장 (PNG)</button>
      <button id="cancelSaveBtn">취소</button>
    </div>
    <div class="toast" id="saveToast">✓ 클립보드에 복사되었습니다</div>
  </div>
</div>
<main>
  <aside class="left" id="drawer">
    <div class="section-title">
      <span>옵션 선택 (최대 6개)</span>
      <button class="drawer-close" id="drawerClose" aria-label="닫기">✕</button>
    </div>
    <div class="opt-search"><input id="optSearch" placeholder="옵션 검색..." type="text"></div>
    <div class="selected-list" id="selectedList"></div>
    <div class="formula-wrap" id="formulaWrap"></div>
    <div class="opt-list" id="optList"></div>
    <button class="clear-btn" id="clearBtn">전체 선택 해제</button>
  </aside>
  <div class="right">
    <div class="tabs">
      <div class="tab active" data-tab="grid">골구도 (동호수기준DB)</div>
      <div class="tab" data-tab="unit">★ 세대옵션표 (출력) ★</div>
    </div>
    <div class="view active" id="gridView">
      <div class="grid-info" id="gridInfo"></div>
      <div class="grid-scroll"><div id="gridWrap"></div></div>
    </div>
    <div class="view" id="unitView">
      <div class="unit-search">
        <label>동</label>
        <select id="dongSel"></select>
        <label>호수</label>
        <select id="hoSel"></select>
        <input id="codeInput" placeholder="예: 0108-3801" inputmode="numeric">
        <span class="unit-current" id="unitCurrent"></span>
      </div>
      <div id="unitTable"></div>
    </div>
  </div>
</main>

const MAX_OPTS = 6;
const SLOT_COLORS = ['#3868d8','#e0a800','#22a06b','#7c4dff','#d63384','#0aa2c0'];
// Labels A..F
const LABELS = ['A','B','C','D','E','F'];

// ============ STATE ============
// selected: array of length MAX_OPTS; each slot null or {cat, val}
// null slots preserve alphabet labeling (A3: remove keeps other letters)
let selected = new Array(MAX_OPTS).fill(null);

// Formula representation:
// nodes = ordered array of items representing current formula operand structure.
// Each item is either:
//   {type:'var', idx:0..5}                      - single variable
//   {type:'group', indices:[idx,idx,...], ops:[op,op,...]}  - parenthesized sub-formula
// Between items in `nodes`, there's an operator array `topOps` of length nodes.length-1
// Operators: '∪' (union) or '∩' (intersection)
let formula = {nodes: [], topOps: []};

// Group picking mode
let pickMode = false;
let pickedIdxs = new Set();

let activeUnit = null;

// ============ HELPERS ============
function activeSlots(){
  return selected.map((s,i)=>s?i:-1).filter(i=>i>=0);
}
function slotUsedCount(){return activeSlots().length}

function unitsForOpt(cat,val){
  const s = new Set();
  for(const [code,opts] of Object.entries(DATA.units)){
    if(opts[cat]===val) s.add(code);
  }
  return s;
}

let slotUnitsCache = new Array(MAX_OPTS).fill(null);
function unitsForSlot(idx){
  if(slotUnitsCache[idx]) return slotUnitsCache[idx];
  const s = selected[idx];
  const u = s ? unitsForOpt(s.cat,s.val) : new Set();
  slotUnitsCache[idx] = u;
  return u;
}
function invalidateCache(){slotUnitsCache = new Array(MAX_OPTS).fill(null)}

// Apply op to two sets
function applyOp(a, b, op){
  if(op==='∩'){
    const out = new Set();
    (a.size<b.size?a:b).forEach(x=>{ if((a.size<b.size?b:a).has(x)) out.add(x) });
    return out;
  } else { // ∪
    const out = new Set(a);
    b.forEach(x=>out.add(x));
    return out;
  }
}

// Evaluate a list of nodes + ops. Left-to-right (no precedence: user builds structure).
function evalNodes(nodes, ops){
  if(nodes.length===0) return new Set();
  let acc = evalNode(nodes[0]);
  for(let i=1;i<nodes.length;i++){
    acc = applyOp(acc, evalNode(nodes[i]), ops[i-1]);
  }
  return acc;
}
function evalNode(n){
  if(n.type==='var') return unitsForSlot(n.idx);
  // group: evaluate sub-formula
  const subNodes = n.indices.map(i=>({type:'var',idx:i}));
  return evalNodes(subNodes, n.ops);
}

function evalFormula(){return evalNodes(formula.nodes, formula.topOps)}

// Rebuild formula when selected changes: keep existing structure as much as possible,
// remove references to null slots, add new slots as top-level union nodes.
function rebuildFormula(){
  const active = new Set(activeSlots());
  // Filter nodes
  const newNodes = [];
  const newOps = [];
  formula.nodes.forEach((n, i)=>{
    if(n.type==='var'){
      if(active.has(n.idx)){
        if(newNodes.length>0) newOps.push(formula.topOps[i-1] || '∪');
        newNodes.push({type:'var', idx:n.idx});
      }
    } else {
      const keptIndices = [];
      const keptOps = [];
      n.indices.forEach((idx, j)=>{
        if(active.has(idx)){
          if(keptIndices.length>0) keptOps.push(n.ops[j-1] || '∪');
          keptIndices.push(idx);
        }
      });
      if(keptIndices.length>=2){
        if(newNodes.length>0) newOps.push(formula.topOps[i-1] || '∪');
        newNodes.push({type:'group', indices:keptIndices, ops:keptOps});
      } else if(keptIndices.length===1){
        // group collapsed to single var
        if(newNodes.length>0) newOps.push(formula.topOps[i-1] || '∪');
        newNodes.push({type:'var', idx:keptIndices[0]});
      }
    }
  });
  // Find slots that are active but not yet in formula
  const inFormula = new Set();
  newNodes.forEach(n=>{
    if(n.type==='var') inFormula.add(n.idx);
    else n.indices.forEach(i=>inFormula.add(i));
  });
  activeSlots().forEach(idx=>{
    if(!inFormula.has(idx)){
      if(newNodes.length>0) newOps.push('∪');
      newNodes.push({type:'var', idx});
    }
  });
  formula.nodes = newNodes;
  formula.topOps = newOps;
}

// Return flat list of indices that are currently inside any group
function indicesInGroups(){
  const s = new Set();
  formula.nodes.forEach(n=>{
    if(n.type==='group') n.indices.forEach(i=>s.add(i));
  });
  return s;
}

// ============ OPTION LIST (bottom) ============
function buildOptList(filter=''){
  const list = document.getElementById('optList');
  list.innerHTML = '';
  const f = filter.trim().toLowerCase();
  const full = slotUsedCount() >= MAX_OPTS;

  // for counts, we use current formula result set as denominator context
  const formulaHits = evalFormula();
  const haveSelection = slotUsedCount()>0;

  // Set of currently-selected (cat,val) pairs for active class
  const selSet = new Set(activeSlots().map(i=>selected[i].cat+'\u0000'+selected[i].val));

  DATA.cats.forEach(cat=>{
    const matchedVals = cat.values.filter(v=>!f || v.toLowerCase().includes(f) || cat.name.toLowerCase().includes(f));
    if(matchedVals.length===0) return;
    const div = document.createElement('div');
    const hasSel = matchedVals.some(v=>selSet.has(cat.name+'\u0000'+v));
    div.className = 'cat-box' + (f||hasSel ? ' open' : '');
    div.innerHTML = `<div class="cat-h"><span>${cat.name}</span><span class="arrow">▶</span></div>`;
    const body = document.createElement('div');
    body.className = 'cat-body';
    matchedVals.forEach(v=>{
      const optUnits = unitsForOpt(cat.name,v);
      const isSel = selSet.has(cat.name+'\u0000'+v);
      // Count: if selection exists, show overlap with current formula result
      let cnt;
      if(!haveSelection) cnt = optUnits.size;
      else {
        let n=0; formulaHits.forEach(u=>{if(optUnits.has(u))n++}); cnt = n;
      }
      const o = document.createElement('div');
      let cls = 'opt';
      if(isSel) cls += ' active';
      else if(full) cls += ' disabled';
      o.className = cls;
      o.innerHTML = `<span>${v.replace(/\n/g,' ')}</span><span class="cnt${cnt===0?' zero':''}">${cnt}</span>`;
      o.onclick = ()=>toggleOpt(cat.name,v);
      body.appendChild(o);
    });
    div.appendChild(body);
    div.querySelector('.cat-h').onclick = ()=>div.classList.toggle('open');
    list.appendChild(div);
  });
}

function toggleOpt(cat,val){
  // If already selected, remove (and free slot)
  const existingIdx = selected.findIndex(s=>s && s.cat===cat && s.val===val);
  if(existingIdx>=0){
    selected[existingIdx] = null;
  } else {
    if(slotUsedCount()>=MAX_OPTS){
      alert('옵션은 최대 6개까지 선택할 수 있습니다.');
      return;
    }
    // find first empty slot
    const slot = selected.findIndex(s=>s===null);
    selected[slot] = {cat,val};
  }
  invalidateCache();
  rebuildFormula();
  // if in pick mode, exit
  pickMode = false; pickedIdxs.clear();
  refreshAll();
}

// ============ FORMULA BAR ============
function renderFormula(){
  const wrap = document.getElementById('formulaWrap');
  if(slotUsedCount()===0){
    wrap.innerHTML = '';
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  const canGroup = !pickMode || pickedIdxs.size>=2;
  const alreadyGrouped = indicesInGroups();
  // In pick mode, only allow picking variables NOT already in a group (A2: 1단계만 허용)
  let html = `
    <div class="formula-head">
      <span class="formula-label">수식</span>
      <button class="group-btn ${pickMode?'active':''}" id="groupBtn" ${canGroup?'':'disabled'}>${pickMode?(pickedIdxs.size>=2?'그룹 확정':'그룹 취소'):'그룹'}</button>
    </div>
    <div class="formula ${pickMode?'pick-mode':''}" id="formulaBody"></div>`;
  if(pickMode){
    html += '<div class="formula-hint">그룹으로 묶을 옵션(A~F)을 2개 이상 탭한 후 [그룹 확정]을 누르세요. 이미 그룹에 속한 항목과 그룹 자체는 선택할 수 없습니다.</div>';
  } else {
    html += '<div class="formula-hint">연산자(∪/∩)를 탭하면 서로 토글됩니다. 괄호가 있는 그룹을 탭하면 해제됩니다.</div>';
  }
  wrap.innerHTML = html;

  const body = document.getElementById('formulaBody');
  // Build tokens
  formula.nodes.forEach((n, i)=>{
    if(i>0){
      const op = formula.topOps[i-1];
      const el = document.createElement('span');
      el.className = 'f-op';
      el.textContent = op;
      el.onclick = (e)=>{e.stopPropagation(); formula.topOps[i-1] = op==='∪'?'∩':'∪'; refreshAll()};
      body.appendChild(el);
    }
    if(n.type==='var'){
      const el = document.createElement('span');
      el.className = 'f-var';
      const disabled = pickMode && alreadyGrouped.has(n.idx);
      if(pickMode && pickedIdxs.has(n.idx)) el.classList.add('picked');
      el.style.setProperty('--c', disabled ? '#bbb' : SLOT_COLORS[n.idx]);
      el.textContent = LABELS[n.idx];
      if(pickMode && !disabled){
        el.onclick = ()=>{
          if(pickedIdxs.has(n.idx)) pickedIdxs.delete(n.idx);
          else pickedIdxs.add(n.idx);
          refreshAll();
        };
      }
      body.appendChild(el);
    } else {
      // group
      const gEl = document.createElement('span');
      gEl.className = 'f-group';
      // Not pickable in pick mode (1단계 제한)
      // Outside pick mode, tapping group = ungroup
      gEl.onclick = ()=>{
        if(pickMode) return;
        ungroup(i);
      };
      const lp = document.createElement('span');
      lp.className = 'f-paren';
      lp.textContent = '(';
      gEl.appendChild(lp);
      n.indices.forEach((idx, j)=>{
        if(j>0){
          const op = n.ops[j-1];
          const opEl = document.createElement('span');
          opEl.className = 'f-op';
          opEl.textContent = op;
          opEl.onclick = (e)=>{
            e.stopPropagation();
            if(pickMode) return;
            n.ops[j-1] = op==='∪'?'∩':'∪';
            refreshAll();
          };
          gEl.appendChild(opEl);
        }
        const varEl = document.createElement('span');
        varEl.className = 'f-var';
        varEl.style.setProperty('--c', SLOT_COLORS[idx]);
        varEl.textContent = LABELS[idx];
        gEl.appendChild(varEl);
      });
      const rp = document.createElement('span');
      rp.className = 'f-paren';
      rp.textContent = ')';
      gEl.appendChild(rp);
      body.appendChild(gEl);
    }
  });

  document.getElementById('groupBtn').onclick = ()=>{
    if(!pickMode){
      pickMode = true;
      pickedIdxs.clear();
    } else {
      if(pickedIdxs.size>=2){
        confirmGroup();
      } else {
        // cancel
        pickMode = false;
        pickedIdxs.clear();
      }
    }
    refreshAll();
  };
}

function confirmGroup(){
  if(pickedIdxs.size<2){pickMode=false; pickedIdxs.clear(); return}
  // Find positions of picked vars in formula.nodes (must be top-level var, not in a group)
  const picked = [];
  formula.nodes.forEach((n,i)=>{
    if(n.type==='var' && pickedIdxs.has(n.idx)) picked.push(i);
  });
  if(picked.length<2){pickMode=false; pickedIdxs.clear(); return}
  // Build new nodes list:
  // - Take all nodes; at the position of the FIRST picked, insert a group containing all picked (in their original order);
  //   remove the other picked positions. Also fix operator array.
  // Ops within new group: use the existing topOps between consecutive picked indices in the original list?
  // Simpler and predictable: default all intra-group ops to '∪'. User can toggle afterwards.
  const groupIndices = picked.map(i=>formula.nodes[i].idx);
  const groupOps = new Array(groupIndices.length-1).fill('∪');
  const groupNode = {type:'group', indices:groupIndices, ops:groupOps};
  const firstPos = picked[0];
  const pickedSet = new Set(picked);
  const newNodes = [];
  const newOps = [];
  formula.nodes.forEach((n,i)=>{
    if(i===firstPos){
      if(newNodes.length>0) newOps.push(formula.topOps[i-1]||'∪');
      newNodes.push(groupNode);
    } else if(!pickedSet.has(i)){
      if(newNodes.length>0){
        // choose the original op leading into this node
        newOps.push(formula.topOps[i-1]||'∪');
      }
      newNodes.push(n);
    }
  });
  formula.nodes = newNodes;
  formula.topOps = newOps;
  pickMode = false;
  pickedIdxs.clear();
}

function ungroup(nodeIdx){
  const n = formula.nodes[nodeIdx];
  if(n.type!=='group') return;
  const expandedNodes = n.indices.map(i=>({type:'var',idx:i}));
  const expandedOps = n.ops.slice();
  // Replace n with expandedNodes, and patch operators around
  const before = formula.nodes.slice(0, nodeIdx);
  const after = formula.nodes.slice(nodeIdx+1);
  const beforeOps = formula.topOps.slice(0, nodeIdx-1>=0?nodeIdx-1:0);
  // topOps index i connects nodes[i] and nodes[i+1]
  // op before n: index nodeIdx-1 (if nodeIdx>0)
  // op after n: index nodeIdx (if nodeIdx<nodes.length-1)
  const opBefore = nodeIdx>0 ? formula.topOps[nodeIdx-1] : null;
  const opAfter = nodeIdx<formula.nodes.length-1 ? formula.topOps[nodeIdx] : null;
  const newNodes = [...before, ...expandedNodes, ...after];
  const newOps = [];
  for(let i=0;i<nodeIdx-1;i++) newOps.push(formula.topOps[i]);
  if(opBefore!==null) newOps.push(opBefore);
  for(let i=0;i<expandedOps.length;i++) newOps.push(expandedOps[i]);
  if(opAfter!==null) newOps.push(opAfter);
  for(let i=nodeIdx+1;i<formula.nodes.length-1;i++) newOps.push(formula.topOps[i]);
  formula.nodes = newNodes;
  formula.topOps = newOps;
  refreshAll();
}

// ============ GRID VIEW ============
// Pre-compute per-column types (0=empty, 1=label-only, 2=unit) once
let COL_TYPES = null;
function computeColTypes(){
  if(COL_TYPES) return COL_TYPES;
  COL_TYPES = new Array(DATA.cols).fill(0);
  const cellMap = {};
  DATA.grid.forEach(g=>{
    const c = g.c;
    if(g.t==='unit') COL_TYPES[c] = 2;
    else if(COL_TYPES[c] < 1) COL_TYPES[c] = 1;
  });
  return COL_TYPES;
}

// Color for a slot idx, considering grouping
function colorForSlot(idx){
  for(const n of formula.nodes){
    if(n.type==='group' && n.indices.includes(idx)){
      return SLOT_COLORS[n.indices[0]];
    }
  }
  return SLOT_COLORS[idx];
}

function renderGrid(){
  const wrap = document.getElementById('gridWrap');
  const cellMap = {};
  DATA.grid.forEach(g=>{cellMap[g.r+','+g.c]=g});

  const finalHits = evalFormula();
  const active = activeSlots();

  function colorsFor(code){
    const seen = new Set();
    const cs = [];
    active.forEach(idx=>{
      if(unitsForSlot(idx).has(code)){
        const c = colorForSlot(idx);
        if(!seen.has(c)){seen.add(c); cs.push(c)}
      }
    });
    return cs;
  }

  const anyHighlight = active.length>0;

  // ---- Column width computation ----
  // Categorize columns and assign widths based on available space
  const colTypes = computeColTypes();
  const EMPTY_W = 8;      // completely blank spacer columns
  const LABEL_W = 28;     // floor-label-only columns
  const UNIT_W_MIN = 36;  // unit cells: minimum
  const UNIT_W_PREF = 56; // unit cells: preferred when space allows

  // Count each type
  let nEmpty = 0, nLabel = 0, nUnit = 0;
  colTypes.forEach(t=>{
    if(t===0) nEmpty++;
    else if(t===1) nLabel++;
    else nUnit++;
  });

  // Available width = grid-scroll container width (minus padding/borders)
  const scrollEl = wrap.parentElement; // .grid-scroll
  const avail = scrollEl.clientWidth - 2;
  const fixedW = nEmpty*EMPTY_W + nLabel*LABEL_W;
  const forUnits = Math.max(0, avail - fixedW - (DATA.cols+1)); // minus border-spacing
  let unitW = Math.floor(forUnits / Math.max(nUnit,1));
  if(unitW < UNIT_W_MIN) unitW = UNIT_W_MIN;        // allow horizontal scroll
  if(unitW > UNIT_W_PREF) unitW = UNIT_W_PREF;      // don't stretch too wide

  // Build colgroup
  let colgroupHtml = '<colgroup>';
  colTypes.forEach(t=>{
    let w = t===0 ? EMPTY_W : (t===1 ? LABEL_W : unitW);
    colgroupHtml += `<col style="width:${w}px">`;
  });
  colgroupHtml += '</colgroup>';

  let html = '<table class="grid">' + colgroupHtml;
  for(let r=0;r<DATA.rows;r++){
    html += '<tr>';
    for(let c=0;c<DATA.cols;c++){
      const g = cellMap[r+','+c];
      if(!g){html+='<td class="empty"></td>';continue}
      if(g.t==='unit'){
        let cls='unit';
        const cs = anyHighlight ? colorsFor(g.v) : [];
        const isFinal = finalHits.has(g.v);
        if(cs.length===0 && anyHighlight) cls += ' dim';
        if(isFinal) cls += ' final';
        if(activeUnit===g.v) cls += ' clicked';
        let inner = '';
        if(cs.length>0){
          inner = `<div class="stripes">${cs.map(x=>`<div style="background:${x}"></div>`).join('')}</div><span class="unit-label">${g.v.slice(5)}</span>`;
        } else {
          inner = g.v.slice(5);
        }
        html += `<td class="${cls}" data-u="${g.v}" title="${g.v}">${inner}</td>`;
      } else {
        html += `<td class="label">${g.v}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('td.unit').forEach(td=>{
    td.onclick = ()=>{
      activeUnit = td.dataset.u;
      switchTab('unit');
      renderUnitView();
      renderGrid();
    };
  });

  // Info bar
  const info = document.getElementById('gridInfo');
  if(active.length===0){
    info.innerHTML = '왼쪽에서 옵션을 선택하세요 (최대 6개). 각 옵션은 A, B, C... 순서로 자동 배정되고, 수식 영역에서 연산자를 탭해 <b>∪</b>(합집합) / <b>∩</b>(교집합)을 토글할 수 있습니다. <b>[그룹]</b> 버튼으로 부분식을 괄호로 묶을 수 있습니다.';
  } else {
    const seenColors = new Map();
    active.forEach(idx=>{
      const c = colorForSlot(idx);
      if(!seenColors.has(c)) seenColors.set(c, []);
      seenColors.get(c).push(LABELS[idx]);
    });
    let legend = '';
    seenColors.forEach((labels, c)=>{
      legend += `<span><i style="background:${c}"></i>${labels.join('+')}</span>`;
    });
    legend += `<span><i style="background:#fff;border:3px solid #000"></i>최종 수식 결과</span>`;
    info.innerHTML = `
      최종 수식 매칭 세대 <span class="hit-count">${finalHits.size}</span>
      <div class="legend">${legend}</div>`;
  }
}

// ============ UNIT VIEW ============
function buildUnitSelectors(){
  const dongs = [...new Set(Object.keys(DATA.units).map(c=>c.split('-')[0]))].sort();
  const dongSel = document.getElementById('dongSel');
  dongSel.innerHTML = '<option value="">--</option>'+dongs.map(d=>`<option>${d}</option>`).join('');
  dongSel.onchange = ()=>updateHoSel();
  document.getElementById('hoSel').onchange = ()=>{
    const d=dongSel.value, h=document.getElementById('hoSel').value;
    if(d&&h){activeUnit=d+'-'+h; renderUnitView(); renderGrid()}
  };
  document.getElementById('codeInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const v = e.target.value.trim();
      if(DATA.units[v]){activeUnit=v; syncSelectors(); renderUnitView(); renderGrid()}
      else alert('해당 세대가 없습니다: '+v);
    }
  });
}
function updateHoSel(){
  const d = document.getElementById('dongSel').value;
  const hoSel = document.getElementById('hoSel');
  if(!d){hoSel.innerHTML='<option value="">--</option>';return}
  const hos = Object.keys(DATA.units).filter(c=>c.startsWith(d+'-')).map(c=>c.split('-')[1]).sort();
  hoSel.innerHTML = '<option value="">--</option>'+hos.map(h=>`<option>${h}</option>`).join('');
}
function syncSelectors(){
  if(!activeUnit) return;
  const [d,h] = activeUnit.split('-');
  document.getElementById('dongSel').value = d;
  updateHoSel();
  document.getElementById('hoSel').value = h;
  document.getElementById('codeInput').value = activeUnit;
}
function renderUnitView(){
  const tbl = document.getElementById('unitTable');
  if(!activeUnit){tbl.innerHTML='<div class="empty-msg">동/호수를 선택하거나 골구도에서 셀을 클릭하세요.</div>'; document.getElementById('unitCurrent').textContent=''; return}
  syncSelectors();
  document.getElementById('unitCurrent').textContent = activeUnit;
  const opts = DATA.units[activeUnit] || {};
  const selSet = new Set(activeSlots().map(i=>selected[i].cat+'\u0000'+selected[i].val));
  let html = '<table class="opts"><tbody>';
  DATA.cats.forEach(cat=>{
    const v = opts[cat.name];
    if(v){
      const matched = selSet.has(cat.name+'\u0000'+v);
      html += `<tr><th>${cat.name}</th><td class="${matched?'match':'has'}">${v.replace(/\n/g,' ')}${matched?' ★':''}</td></tr>`;
    } else {
      html += `<tr><th>${cat.name}</th><td class="none">—</td></tr>`;
    }
  });
  html += '</tbody></table>';
  tbl.innerHTML = html;
}

// ============ IMAGE EXPORT ============
function drawGridToCanvas(){
  // Layout (px in canvas)
  const EMPTY_W = 8, LABEL_W = 32, UNIT_W = 64, ROW_H = 36;
  const PADDING = 24;
  const HEADER_H = 80;       // title + info area
  const LEGEND_H = 40;
  const FOOTER_H = 20;
  const BORDER = 2;          // border between cells

  const colTypes = computeColTypes();
  // Calculate total width
  let gridW = 0;
  const colW = [];
  colTypes.forEach(t=>{
    let w = t===0 ? EMPTY_W : (t===1 ? LABEL_W : UNIT_W);
    colW.push(w);
    gridW += w + BORDER;
  });
  gridW += BORDER;
  const gridH = DATA.rows * (ROW_H + BORDER) + BORDER;

  const canvasW = Math.max(gridW + PADDING*2, 700);
  const canvasH = HEADER_H + gridH + LEGEND_H + FOOTER_H + PADDING*2;

  // Use 2x scale for retina
  const scale = 2;
  const canvas = document.createElement('canvas');
  canvas.width = canvasW * scale;
  canvas.height = canvasH * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Title
  ctx.fillStyle = '#1f2a44';
  ctx.font = 'bold 18px -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText('가장더퍼스트 옵션 골구도', PADDING, PADDING);

  // Date
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  ctx.fillStyle = '#888';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillText(dateStr, PADDING, PADDING + 24);

  // Formula / info
  const finalHits = evalFormula();
  const active = activeSlots();
  let infoY = PADDING + 42;
  if(active.length > 0){
    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px -apple-system, sans-serif';
    const formulaText = formulaToString();
    ctx.fillText(`수식: ${formulaText}`, PADDING, infoY);
    infoY += 18;
    ctx.fillStyle = '#3868d8';
    ctx.font = 'bold 13px -apple-system, sans-serif';
    ctx.fillText(`최종 매칭 세대: ${finalHits.size}개`, PADDING, infoY);
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.fillText(`총 ${Object.keys(DATA.units).length}세대`, PADDING, infoY);
  }

  // Grid
  const cellMap = {};
  DATA.grid.forEach(g=>{cellMap[g.r+','+g.c]=g});

  function colorsFor(code){
    const seen = new Set();
    const cs = [];
    active.forEach(idx=>{
      if(unitsForSlot(idx).has(code)){
        const c = colorForSlot(idx);
        if(!seen.has(c)){seen.add(c); cs.push(c)}
      }
    });
    return cs;
  }

  // Compute cumulative x for each col
  const colX = [PADDING + BORDER];
  for(let c=0;c<DATA.cols;c++) colX.push(colX[c] + colW[c] + BORDER);

  const gridY = HEADER_H + PADDING;

  // Background border (separator color)
  ctx.fillStyle = '#dfe2ea';
  ctx.fillRect(PADDING, gridY, gridW, gridH);

  for(let r=0;r<DATA.rows;r++){
    const y = gridY + BORDER + r*(ROW_H + BORDER);
    for(let c=0;c<DATA.cols;c++){
      const x = colX[c];
      const w = colW[c];
      const g = cellMap[r+','+c];
      if(!g){
        // empty cell - white
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x, y, w, ROW_H);
        continue;
      }
      if(g.t === 'unit'){
        const cs = active.length > 0 ? colorsFor(g.v) : [];
        const isFinal = finalHits.has(g.v);
        const isDim = cs.length === 0 && active.length > 0;

        // Base white
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(x, y, w, ROW_H);

        // Stripes (if any), inset 3px when final
        if(cs.length > 0){
          const inset = isFinal ? 3 : 0;
          const sw = (w - inset*2) / cs.length;
          cs.forEach((color, i)=>{
            ctx.fillStyle = color;
            ctx.fillRect(x + inset + i*sw, y + inset, sw, ROW_H - inset*2);
          });
        }

        // Dim overlay
        if(isDim){
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.fillRect(x, y, w, ROW_H);
        }

        // Final border (3px black)
        if(isFinal){
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 3;
          ctx.strokeRect(x + 1.5, y + 1.5, w - 3, ROW_H - 3);
        }

        // Unit label (last 4 chars)
        const label = g.v.slice(5);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 11px Menlo, Consolas, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // White outline for contrast on colored backgrounds
        if(cs.length > 0){
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 3;
          ctx.strokeText(label, x + w/2, y + ROW_H/2);
        }
        ctx.fillText(label, x + w/2, y + ROW_H/2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
      } else {
        // label cell
        ctx.fillStyle = '#f0f2f6';
        ctx.fillRect(x, y, w, ROW_H);
        ctx.fillStyle = '#555';
        ctx.font = 'bold 11px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(g.v, x + w/2, y + ROW_H/2);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
      }
    }
  }

  // Legend
  if(active.length > 0){
    const legendY = gridY + gridH + 14;
    let lx = PADDING;
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textBaseline = 'middle';

    const seenColors = new Map();
    active.forEach(idx=>{
      const c = colorForSlot(idx);
      if(!seenColors.has(c)) seenColors.set(c, []);
      seenColors.get(c).push(idx);
    });

    seenColors.forEach((idxList, color)=>{
      const labelStr = idxList.map(i=>LABELS[i]).join('+') + ': ' + idxList.map(i=>{
        const sl = selected[i];
        return `${sl.cat}-${sl.val.replace(/\n/g,' ')}`;
      }).join(' / ');
      // Color square
      ctx.fillStyle = color;
      ctx.fillRect(lx, legendY - 6, 12, 12);
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(lx + 0.5, legendY - 5.5, 11, 11);
      ctx.fillStyle = '#333';
      const textW = ctx.measureText(labelStr).width;
      ctx.fillText(labelStr, lx + 18, legendY);
      lx += 18 + textW + 16;
    });

    // Final result indicator
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeRect(lx + 1.5, legendY - 5.5 + 1, 11, 10);
    ctx.fillStyle = '#333';
    ctx.fillText('최종 수식 결과', lx + 18, legendY);

    ctx.textBaseline = 'top';
  }

  return canvas;
}

function formulaToString(){
  let s = '';
  formula.nodes.forEach((n, i)=>{
    if(i > 0) s += ' ' + formula.topOps[i-1] + ' ';
    if(n.type === 'var'){
      const sl = selected[n.idx];
      s += `${LABELS[n.idx]}(${sl.val.replace(/\n/g,' ')})`;
    } else {
      s += '(';
      n.indices.forEach((idx, j)=>{
        if(j > 0) s += ' ' + n.ops[j-1] + ' ';
        const sl = selected[idx];
        s += `${LABELS[idx]}(${sl.val.replace(/\n/g,' ')})`;
      });
      s += ')';
    }
  });
  return s || '(없음)';
}

function getFilename(){
  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  return `골구도_${ts}.png`;
}

function downloadCanvas(canvas){
  canvas.toBlob(async blob=>{
    const filename = getFilename();
    let saved = false;
    
    // Try 1: Modern Share API (iOS/Android)
    if(navigator.share && isMobileDevice()){
      try {
        const file = new File([blob], filename, {type: 'image/png'});
        await navigator.share({
          files: [file],
          title: filename
        });
        saved = true;
        showSaveSuccess();
        return;
      } catch(e){
        if(e.name !== 'AbortError') console.log('Share failed:', e);
      }
    }
    
    // Try 2: Download attribute (most browsers)
    try {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
      saved = true;
      showSaveSuccess();
      return;
    } catch(e){
      console.log('Download failed:', e);
    }
    
    // Try 3: Canvas.toDataURL (fallback for older iOS)
    try {
      const dataUrl = canvas.toDataURL('image/png');
      const w = window.open();
      w.document.write(`<img src="${dataUrl}" style="max-width:100%">`);
      saved = true;
      showSaveSuccess();
      return;
    } catch(e){
      console.log('DataURL failed:', e);
    }
    
    alert('이미지 저장에 실패했습니다. 클립보드 복사를 시도해주세요.');
  }, 'image/png', 0.95);
}

function showSaveSuccess(){
  // Mobile: show brief toast or haptic feedback
  if(isMobileDevice()){
    if(navigator.vibrate) navigator.vibrate(100);
    const saveBtn = document.getElementById('saveBtn');
    if(saveBtn){
      const orig = saveBtn.innerHTML;
      saveBtn.innerHTML = '✓ 저장됨!';
      setTimeout(()=>{
        saveBtn.innerHTML = orig;
      }, 1500);
    }
  }
}

async function copyCanvasToClipboard(canvas){
  if(!navigator.clipboard || !window.ClipboardItem){
    alert('이 브라우저는 클립보드 복사를 지원하지 않습니다. 파일 저장을 사용해주세요.');
    return false;
  }
  try {
    const blob = await new Promise(res=>canvas.toBlob(res, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    return true;
  } catch(e){
    alert('클립보드 복사 실패: ' + e.message);
    return false;
  }
}

function isMobileDevice(){
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || isMobile();
}

function handleSaveBtn(){
  const canvas = drawGridToCanvas();
  if(isMobileDevice()){
    // mobile: direct download with feedback
    const saveBtn = document.getElementById('saveBtn');
    const originalText = saveBtn.innerHTML;
    saveBtn.innerHTML = '💾 저장 중...';
    saveBtn.disabled = true;
    
    setTimeout(()=>{
      downloadCanvas(canvas);
      saveBtn.innerHTML = originalText;
      saveBtn.disabled = false;
    }, 100);
  } else {
    // PC: show dialog
    window._pendingCanvas = canvas;
    document.getElementById('saveDialog').classList.add('show');
    document.getElementById('saveToast').classList.remove('show');
  }
}

document.getElementById('saveBtn').onclick = handleSaveBtn;
document.getElementById('cancelSaveBtn').onclick = ()=>{
  document.getElementById('saveDialog').classList.remove('show');
};
document.getElementById('downloadBtn').onclick = ()=>{
  if(window._pendingCanvas){
    downloadCanvas(window._pendingCanvas);
    document.getElementById('saveDialog').classList.remove('show');
  }
};
document.getElementById('copyClipBtn').onclick = async ()=>{
  if(window._pendingCanvas){
    const ok = await copyCanvasToClipboard(window._pendingCanvas);
    if(ok){
      document.getElementById('saveToast').classList.add('show');
      setTimeout(()=>document.getElementById('saveDialog').classList.remove('show'), 1100);
    }
  }
};
document.getElementById('saveDialog').onclick = (e)=>{
  if(e.target.id === 'saveDialog') document.getElementById('saveDialog').classList.remove('show');
};

// ============ DRAWER ============
const drawer = document.getElementById('drawer');
const overlay = document.getElementById('overlay');
function isMobile(){return window.innerWidth <= 820}
function toggleDrawer(){
  if(isMobile()){
    if(drawer.classList.contains('open')){
      drawer.classList.remove('open');
      overlay.classList.remove('show');
    } else {
      drawer.classList.add('open');
      overlay.classList.add('show');
    }
  } else {
    drawer.classList.toggle('collapsed');
    // re-render grid after transition to recalc widths
    setTimeout(renderGrid, 240);
  }
}
function closeDrawer(){
  drawer.classList.remove('open');
  overlay.classList.remove('show');
}
document.getElementById('menuBtn').onclick = toggleDrawer;
document.getElementById('drawerClose').onclick = closeDrawer;
overlay.onclick = closeDrawer;

// Re-render grid on window resize (debounced)
let resizeTO = null;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTO);
  resizeTO = setTimeout(renderGrid, 120);
});

// ============ REFRESH ============
function refreshAll(){
  renderSelectedList();
  renderFormula();
  buildOptList(document.getElementById('optSearch').value);
  renderGrid();
  renderUnitView();
  const cc = document.getElementById('chipCount');
  const n = slotUsedCount();
  if(n>0){cc.textContent=n; cc.classList.add('show')}
  else cc.classList.remove('show');
}

// ============ INIT ============
document.getElementById('stats').textContent = `세대 ${Object.keys(DATA.units).length}개 · 옵션 카테고리 ${DATA.cats.length}개`;
buildUnitSelectors();
refreshAll();
</script>
