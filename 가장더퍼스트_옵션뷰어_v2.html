<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>가장더퍼스트 옵션 현황 뷰어</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:rgba(56,104,216,.15)}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#222;background:#f5f6f8;-webkit-text-size-adjust:100%}
body{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
button{font-family:inherit}
input,select{font-family:inherit;font-size:16px} /* 16px prevents iOS zoom */

header{padding:10px 14px;background:#1f2a44;color:#fff;flex:0 0 auto;display:flex;align-items:center;gap:10px;min-height:48px}
header h1{font-size:15px;margin:0;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header .stats{font-size:11px;opacity:.8;white-space:nowrap}
.menu-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:6px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:20px;padding:0}
.menu-btn:active{background:rgba(255,255,255,.25)}
.chip-count{background:#e0a800;color:#1f2a44;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;display:none}
.chip-count.show{display:inline-block}

main{flex:1;display:flex;min-height:0;position:relative}
.left{flex:0 0 300px;background:#fff;border-right:1px solid #e3e6ec;display:flex;flex-direction:column;min-height:0;transition:flex-basis .2s,transform .2s}
.left.collapsed{flex:0 0 0;overflow:hidden;border-right:none}
.right{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}

/* Collapse toggle button (PC only) */
.collapse-btn{position:absolute;left:-1px;top:50%;transform:translateY(-50%);z-index:10;background:#fff;border:1px solid #e3e6ec;border-left:none;border-radius:0 6px 6px 0;width:20px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#888;font-size:11px;line-height:1;transition:left .2s;box-shadow:2px 0 4px rgba(0,0,0,.06)}
.collapse-btn:hover{background:#f0f4ff;color:#3868d8}
.left.collapsed ~ .right .collapse-btn{left:0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.overlay.show{display:block}

.section-title{padding:12px 14px;font-size:12px;font-weight:700;color:#555;background:#f0f2f6;border-bottom:1px solid #e3e6ec;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.drawer-close{display:none;background:none;border:none;font-size:22px;color:#666;cursor:pointer;padding:0;width:30px;height:30px;line-height:1}
.mode-toggle{display:flex;gap:0;border:1px solid #ccd;border-radius:5px;overflow:hidden}
.mode-toggle button{background:#fff;border:none;padding:6px 12px;font-size:12px;cursor:pointer;color:#666;font-weight:700;min-height:32px}
.mode-toggle button.active{background:#3868d8;color:#fff}

.opt-search{padding:10px;border-bottom:1px solid #eee}
.opt-search input{width:100%;padding:9px 12px;border:1px solid #ccd;border-radius:6px;outline:none}
.opt-search input:focus{border-color:#3868d8}

.selected-bar{padding:10px;border-bottom:1px solid #eee;background:#fafbfd;min-height:46px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.selected-bar .empty-hint{font-size:12px;color:#999;font-style:italic}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 6px 5px 10px;border-radius:13px;font-size:12px;color:#fff;font-weight:600;line-height:1.2;max-width:100%;background:#3868d8}
.chip .x{background:rgba(255,255,255,.3);width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;line-height:1}
.chip .x:active{background:rgba(255,255,255,.55)}
.chip-cat{opacity:.75;font-weight:400;margin-right:2px}

.snapshot-actions{padding:8px 10px;border-bottom:1px solid #eee;background:#fafbfd;display:flex;gap:6px}
.snap-save-btn{flex:1;padding:9px;background:#fff;border:1px dashed #3868d8;color:#3868d8;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;min-height:38px}
.snap-save-btn:active{background:#eef3ff}
.snap-save-btn:disabled{opacity:.4;cursor:not-allowed;border-style:dotted}
.overlap-btn{padding:9px 12px;background:#fff;border:1px solid #ccd;color:#555;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;min-height:38px;white-space:nowrap}
.overlap-btn:active{background:#eef3ff}
.overlap-btn.active{background:#7c4dff;border-color:#7c4dff;color:#fff}
.overlap-btn:disabled{opacity:.4;cursor:not-allowed}

.groups-wrap{padding:8px 10px;border-bottom:1px solid #eee;background:#fafbfd;display:none;flex-direction:column;gap:8px}
.groups-wrap.show{display:flex}
.groups-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:-2px}
.group-card{background:#fff;border:2px solid #e3e6ec;border-radius:7px;padding:8px 10px;cursor:pointer;transition:border-color .12s}
.group-card:active{background:#f7f9fc}
.group-card.active{border-color:var(--gc)}
.group-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.group-badge{width:22px;height:22px;border-radius:50%;background:var(--gc);color:#fff;font-weight:800;font-size:13px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.group-name{font-weight:700;font-size:12px;color:#333;flex:1}
.group-count{background:var(--gc);color:#fff;padding:1px 8px;border-radius:9px;font-weight:700;font-size:11px}
.group-mode{background:#666;color:#fff;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700}
.group-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.group-chips .g-chip{display:inline-block;background:#eef0f4;color:#555;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;line-height:1.4;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.group-btns{display:flex;gap:5px}
.group-btns button{flex:1;padding:5px;border:1px solid #d0d4dc;border-radius:4px;background:#fff;color:#555;font-size:10px;font-weight:700;cursor:pointer;min-height:28px}
.group-btns button:active{background:#eef3ff}
.group-btns button.del{color:#c33;border-color:#e5b0b0}
.group-btns button.del:active{background:#fde}

.opt-list{flex:1;overflow-y:auto;font-size:14px;-webkit-overflow-scrolling:touch}
.cat{border-bottom:1px solid #eef0f4}
.cat-h{padding:13px 14px;background:#fafbfd;font-weight:700;font-size:13px;color:#1f2a44;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;min-height:44px}
.cat-h:active{background:#e8edf8}
.cat-h .arrow{font-size:11px;opacity:.6;transition:transform .15s}
.cat-body{display:none;padding:2px 0 6px}
.cat.open .cat-body{display:block}
.cat.open .arrow{transform:rotate(90deg)}
.opt{padding:11px 14px 11px 28px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:#333;min-height:42px}
.opt:active{background:#eef3ff}
.opt.active{font-weight:700;background:#f5f8ff;color:#3868d8}
.opt .cnt{margin-left:auto;font-size:11px;opacity:.7;background:rgba(0,0,0,.06);padding:2px 8px;border-radius:10px;font-weight:600}
.opt .cnt.zero{color:#c33;background:#fde}

.clear-btn{margin:10px;padding:11px;background:#eef0f4;border:none;border-radius:6px;cursor:pointer;font-size:13px;color:#444;font-weight:600;min-height:42px}
.clear-btn:active{background:#dde1ea}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e3e6ec;flex:0 0 auto}
.tab{padding:13px 18px;font-size:13px;font-weight:600;cursor:pointer;color:#666;border-bottom:3px solid transparent;flex:1;text-align:center;min-height:46px}
.tab.active{color:#3868d8;border-bottom-color:#3868d8}
.tab:active{background:#f6f8fc}

.view{flex:1;overflow:auto;background:#fff;display:none;-webkit-overflow-scrolling:touch}
.view.active{display:block}

#gridView{padding:12px}
.grid-info{margin-bottom:10px;font-size:12px;color:#555;line-height:1.7}
.grid-info b{color:#1f2a44}
.grid-info .hit-count{display:inline-block;background:#3868d8;color:#fff;padding:2px 9px;border-radius:10px;font-weight:700;margin-left:4px}
.legend{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:4px;font-size:11px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:11px;height:11px;border-radius:2px;display:inline-block}

.grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}
table.grid{border-collapse:separate;border-spacing:1px;background:#dfe2ea;font-size:11px}
table.grid td{background:#fff;padding:0;width:58px;height:30px;min-width:58px;text-align:center;vertical-align:middle;white-space:nowrap}
td.unit{cursor:pointer;font-family:Menlo,Consolas,monospace;font-size:10px;color:#333;position:relative}
td.unit:active{outline:2px solid #e0a800;z-index:2}
td.unit.dim{opacity:.32}
td.unit.selected{outline:3px solid #000;outline-offset:-1px;z-index:3}

/* Solid single-color states (no stripes) */
td.unit.hit{background:#3868d8;color:#fff;font-weight:700}
td.unit.g-a{background:#3868d8;color:#fff;font-weight:700}
td.unit.g-b{background:#e0a800;color:#fff;font-weight:700}
td.unit.g-c{background:#22a06b;color:#fff;font-weight:700}
td.unit.g-d{background:#7c4dff;color:#fff;font-weight:700}
td.unit.g-overlap{background:#d63384;color:#fff;font-weight:700}  /* 겹침 (여러 그룹) */

td.label{background:#f0f2f6;color:#555;font-weight:600;font-size:10px;padding:0 4px}
td.empty{background:transparent}

#unitView{padding:12px}
.unit-search{margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.unit-search label{font-size:13px;color:#555;font-weight:600}
.unit-search select,.unit-search input{padding:9px 10px;border:1px solid #ccd;border-radius:6px;outline:none;background:#fff;min-height:40px}
.unit-search input{flex:1;min-width:140px}
.unit-search select{min-width:90px}
.unit-search select:focus,.unit-search input:focus{border-color:#3868d8}
.unit-current{font-weight:700;color:#3868d8;font-size:16px;width:100%;padding-top:2px}
table.opts{border-collapse:collapse;width:100%;max-width:640px;font-size:14px;background:#fff}
table.opts th,table.opts td{border:1px solid #e0e3ea;padding:10px 12px;text-align:left;word-break:keep-all}
table.opts th{background:#f0f2f6;width:42%;font-weight:600;color:#333;font-size:13px}
table.opts td.has{color:#222}
table.opts td.match{background:#fff7d8;font-weight:700;color:#7a5500}
table.opts td.none{color:#bbb;font-style:italic}
.empty-msg{color:#999;font-size:14px;padding:30px 20px;text-align:center}

/* ============ MOBILE ============ */
@media (max-width: 820px){
  header{padding:8px 12px;min-height:52px}
  header h1{font-size:14px}
  header .stats{display:none}
  .menu-btn{display:inline-flex}
  .collapse-btn{display:none}

  .left{position:fixed;top:0;left:0;bottom:0;width:86%;max-width:360px;z-index:100;transform:translateX(-100%);transition:transform .22s ease-out;box-shadow:2px 0 18px rgba(0,0,0,.2)}
  .left.open{transform:translateX(0)}
  .drawer-close{display:inline-flex;align-items:center;justify-content:center}

  .right{width:100%}

  #gridView{padding:8px}
  table.grid td{width:30px;height:26px;min-width:30px;font-size:9px}
  td.unit{font-size:9px}
  td.label{font-size:8px;padding:0 2px}

  #unitView{padding:10px}
  .unit-search{gap:6px}
  .unit-search label{width:100%;margin-bottom:-4px}
  .unit-search select{flex:1;min-width:0}
  .unit-search input{flex:1 1 100%;min-width:0}
  table.opts th{width:45%;font-size:12px;padding:9px 10px}
  table.opts td{font-size:13px;padding:9px 10px}

  .tab{padding:13px 8px;font-size:12px}
}

@media (max-width: 420px){
  table.grid td{width:26px;height:24px;min-width:26px;font-size:8px}
  td.unit{font-size:8px}
  td.label{font-size:7px}
}
</style>
</head>
<body>
<header>
  <button class="menu-btn" id="menuBtn" aria-label="옵션 메뉴">☰<span class="chip-count" id="chipCount"></span></button>
  <h1>가장더퍼스트 옵션 뷰어</h1>
  <span class="stats" id="stats"></span>
</header>
<div class="overlay" id="overlay"></div>
<main>
  <aside class="left" id="drawer">
    <div class="section-title">
      <span>옵션 선택 (다중)</span>
      <div class="mode-toggle">
        <button id="modeAnd" class="active" title="모든 옵션을 동시에 만족하는 세대">AND</button>
        <button id="modeOr" title="하나라도 만족하는 세대">OR</button>
      </div>
      <button class="drawer-close" id="drawerClose" aria-label="닫기">✕</button>
    </div>
    <div class="opt-search"><input id="optSearch" placeholder="옵션 검색..." type="text"></div>
    <div class="selected-bar" id="selectedBar"></div>
    <div class="snapshot-actions">
      <button class="snap-save-btn" id="snapSaveBtn">＋ 그룹으로 저장</button>
      <button class="overlap-btn" id="overlapBtn" disabled title="활성 그룹들의 겹침 분석">겹침</button>
    </div>
    <div class="groups-wrap" id="groupsWrap"></div>
    <div class="opt-list" id="optList"></div>
    <button class="clear-btn" id="clearBtn">전체 선택 해제</button>
  </aside>
  <div class="right">
    <button class="collapse-btn" id="collapseBtn" title="사이드바 접기/펼치기">◀</button>
    <div class="tabs">
      <div class="tab active" data-tab="grid">골구도 (동호수기준DB)</div>
      <div class="tab" data-tab="unit">★ 세대옵션표 (출력) ★</div>
    </div>
    <div class="view active" id="gridView">
      <div class="grid-info" id="gridInfo"></div>
      <div class="grid-scroll"><div id="gridWrap"></div></div>
    </div>
    <div class="view" id="unitView">
      <div class="unit-search">
        <label>동</label>
        <select id="dongSel"></select>
        <label>호수</label>
        <select id="hoSel"></select>
        <input id="codeInput" placeholder="예: 0108-3801" inputmode="numeric">
        <span class="unit-current" id="unitCurrent"></span>
      </div>
      <div id="unitTable"></div>
    </div>
  </div>
</main>

function isSelected(cat,val){return selected.some(s=>s.cat===cat && s.val===val)}

function unitsForOpt(cat,val){
  const s = new Set();
  for(const [code,opts] of Object.entries(DATA.units)){
    if(opts[cat]===val) s.add(code);
  }
  return s;
}

// Compute matching units for an arbitrary selection+mode
function computeHits(sel, m){
  if(!sel || sel.length===0) return new Set();
  const perOpt = sel.map(s=>unitsForOpt(s.cat,s.val));
  let hits;
  if(m==='AND'){
    hits = new Set(perOpt[0]);
    for(let i=1;i<perOpt.length;i++){
      const u = perOpt[i];
      hits = new Set([...hits].filter(x=>u.has(x)));
    }
  } else {
    hits = new Set();
    perOpt.forEach(u=>u.forEach(x=>hits.add(x)));
  }
  return hits;
}

function buildOptList(filter=''){
  const list = document.getElementById('optList');
  list.innerHTML = '';
  const f = filter.trim().toLowerCase();
  const currHits = computeHits(selected, mode);
  const haveSelection = selected.length>0;

  DATA.cats.forEach(cat=>{
    const matchedVals = cat.values.filter(v=>!f || v.toLowerCase().includes(f) || cat.name.toLowerCase().includes(f));
    if(matchedVals.length===0) return;
    const div = document.createElement('div');
    const hasOpenSelected = matchedVals.some(v=>isSelected(cat.name,v));
    div.className = 'cat' + (f||hasOpenSelected ? ' open' : '');
    div.innerHTML = `<div class="cat-h"><span>${cat.name}</span><span class="arrow">▶</span></div>`;
    const body = document.createElement('div');
    body.className = 'cat-body';
    matchedVals.forEach(v=>{
      const optUnits = unitsForOpt(cat.name,v);
      let cnt;
      if(!haveSelection || mode==='OR') cnt = optUnits.size;
      else if(isSelected(cat.name,v)) cnt = currHits.size;
      else { let n=0; currHits.forEach(u=>{if(optUnits.has(u))n++}); cnt = n; }

      const o = document.createElement('div');
      o.className = 'opt' + (isSelected(cat.name,v)?' active':'');
      o.innerHTML = `<span>${v.replace(/\n/g,' ')}</span><span class="cnt${cnt===0?' zero':''}">${cnt}</span>`;
      o.onclick = ()=>toggleOpt(cat.name,v);
      body.appendChild(o);
    });
    div.appendChild(body);
    div.querySelector('.cat-h').onclick = ()=>div.classList.toggle('open');
    list.appendChild(div);
  });
}

function toggleOpt(cat,val){
  const idx = selected.findIndex(s=>s.cat===cat&&s.val===val);
  if(idx>=0) selected.splice(idx,1);
  else selected.push({cat,val});
  refreshAll();
}

function renderSelectedBar(){
  const bar = document.getElementById('selectedBar');
  if(selected.length===0){
    bar.innerHTML = '<span class="empty-hint">옵션을 클릭해서 추가하세요 (여러 개 선택 가능)</span>';
    return;
  }
  bar.innerHTML = selected.map((s,i)=>
    `<span class="chip"><span class="chip-cat">${s.cat}:</span>${s.val.replace(/\n/g,' ')}<span class="x" data-i="${i}">×</span></span>`
  ).join('');
  bar.querySelectorAll('.x').forEach(x=>x.onclick=()=>{
    selected.splice(parseInt(x.dataset.i),1); refreshAll();
  });
}

// ============ GROUPS ============
function nextGroupSlot(){
  const usedIds = new Set(groups.map(g=>g.id));
  for(const s of GROUP_SLOTS) if(!usedIds.has(s.id)) return s;
  return null;
}
function saveGroup(){
  if(selected.length===0){alert('저장할 옵션 선택이 없습니다.'); return}
  const slot = nextGroupSlot();
  if(!slot){alert('그룹은 최대 4개까지 저장할 수 있습니다. 기존 그룹을 삭제한 후 다시 시도해주세요.'); return}
  groups.push({
    id: slot.id,
    color: slot.color,
    selected: selected.map(s=>({...s})),
    mode: mode,
  });
  // Newly saved group becomes active for immediate visual feedback
  activeGroupId = slot.id;
  overlapMode = false;
  refreshAll();
}
function deleteGroup(id){
  const idx = groups.findIndex(g=>g.id===id);
  if(idx>=0) groups.splice(idx,1);
  if(activeGroupId===id) activeGroupId = null;
  if(groups.length<2) overlapMode = false;
  refreshAll();
}
function loadGroup(id){
  const g = groups.find(g=>g.id===id);
  if(!g) return;
  selected = g.selected.map(s=>({...s}));
  mode = g.mode;
  document.getElementById('modeAnd').classList.toggle('active', mode==='AND');
  document.getElementById('modeOr').classList.toggle('active', mode==='OR');
  activeGroupId = id;
  overlapMode = false;
  refreshAll();
}
function setActiveGroup(id){
  if(activeGroupId === id) activeGroupId = null; // toggle off
  else activeGroupId = id;
  overlapMode = false;
  refreshAll();
}
function toggleOverlap(){
  if(groups.length<2) return;
  overlapMode = !overlapMode;
  if(overlapMode) activeGroupId = null;
  refreshAll();
}

function renderGroups(){
  const wrap = document.getElementById('groupsWrap');
  if(groups.length===0){wrap.classList.remove('show'); wrap.innerHTML=''; return}
  wrap.classList.add('show');
  let html = '<div class="groups-title">저장된 그룹 (탭하여 골구도에 표시)</div>';
  groups.forEach(g=>{
    const hits = computeHits(g.selected, g.mode);
    const chipsHtml = g.selected.map(s=>`<span class="g-chip">${s.cat}: ${s.val.replace(/\n/g,' ')}</span>`).join('');
    const isActive = activeGroupId === g.id;
    html += `
      <div class="group-card ${isActive?'active':''}" data-id="${g.id}" style="--gc:${g.color}">
        <div class="group-head">
          <span class="group-badge">${g.id}</span>
          <span class="group-name">그룹 ${g.id}</span>
          <span class="group-mode">${g.mode}</span>
          <span class="group-count">${hits.size}</span>
        </div>
        <div class="group-chips">${chipsHtml}</div>
        <div class="group-btns">
          <button data-act="load" data-id="${g.id}">불러오기</button>
          <button class="del" data-act="del" data-id="${g.id}">삭제</button>
        </div>
      </div>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.group-card').forEach(card=>{
    card.onclick = (e)=>{
      // ignore clicks on buttons
      if(e.target.closest('button')) return;
      setActiveGroup(card.dataset.id);
    };
  });
  wrap.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const id = btn.dataset.id;
      if(btn.dataset.act==='load') loadGroup(id);
      else if(btn.dataset.act==='del') deleteGroup(id);
    };
  });
}

function renderSnapSaveBtn(){
  const btn = document.getElementById('snapSaveBtn');
  const slotsLeft = GROUP_SLOTS.length - groups.length;
  btn.disabled = selected.length===0 || slotsLeft===0;
  if(slotsLeft===0) btn.textContent = '그룹 최대 4개';
  else btn.textContent = `＋ 그룹 ${nextGroupSlot()?.id || ''}로 저장 (${slotsLeft}칸 남음)`;

  const ov = document.getElementById('overlapBtn');
  ov.disabled = groups.length<2;
  ov.classList.toggle('active', overlapMode);
}

document.getElementById('snapSaveBtn').onclick = saveGroup;
document.getElementById('overlapBtn').onclick = toggleOverlap;
document.getElementById('optSearch').addEventListener('input',e=>buildOptList(e.target.value));
document.getElementById('clearBtn').onclick = ()=>{selected=[]; activeGroupId=null; refreshAll()};
document.getElementById('modeAnd').onclick = ()=>{mode='AND'; document.getElementById('modeAnd').classList.add('active'); document.getElementById('modeOr').classList.remove('active'); refreshAll()};
document.getElementById('modeOr').onclick = ()=>{mode='OR'; document.getElementById('modeOr').classList.add('active'); document.getElementById('modeAnd').classList.remove('active'); refreshAll()};

// ============ GRID VIEW ============
function renderGrid(){
  const wrap = document.getElementById('gridWrap');
  const cellMap = {};
  DATA.grid.forEach(g=>{cellMap[g.r+','+g.c]=g});

  // Determine display mode:
  // 1) overlapMode: color = pink if in 2+ groups, else that group's color
  // 2) activeGroupId set: show only that group in its color
  // 3) groups exist but no active: show current selection in blue (hit)
  // 4) no groups, no selection: nothing
  const currHits = computeHits(selected, mode);
  const groupHits = {};
  groups.forEach(g=>{ groupHits[g.id] = computeHits(g.selected, g.mode) });

  let displayMode = 'current';
  if(overlapMode && groups.length>=2) displayMode = 'overlap';
  else if(activeGroupId) displayMode = 'group';

  const haveHighlight = (() => {
    if(displayMode==='overlap') return groups.some(g=>groupHits[g.id].size>0);
    if(displayMode==='group') return groupHits[activeGroupId] && groupHits[activeGroupId].size>0;
    return currHits.size>0;
  })();

  let html = '<table class="grid">';
  for(let r=0;r<DATA.rows;r++){
    html += '<tr>';
    for(let c=0;c<DATA.cols;c++){
      const g = cellMap[r+','+c];
      if(!g){html+='<td class="empty"></td>';continue}
      if(g.t==='unit'){
        let cls='unit';
        let stateClass = '';
        if(displayMode==='overlap'){
          const inGroups = groups.filter(gr=>groupHits[gr.id].has(g.v));
          if(inGroups.length>=2) stateClass = 'g-overlap';
          else if(inGroups.length===1) stateClass = 'g-' + inGroups[0].id.toLowerCase();
        } else if(displayMode==='group'){
          if(groupHits[activeGroupId].has(g.v)){
            stateClass = 'g-' + activeGroupId.toLowerCase();
          }
        } else {
          if(currHits.has(g.v)) stateClass = 'hit';
        }
        if(stateClass) cls += ' ' + stateClass;
        else if(haveHighlight) cls += ' dim';
        if(activeUnit===g.v) cls+=' selected';
        html += `<td class="${cls}" data-u="${g.v}" title="${g.v}">${g.v.slice(5)}</td>`;
      } else {
        html += `<td class="label">${g.v}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;
  wrap.querySelectorAll('td.unit').forEach(td=>{
    td.onclick = ()=>{
      activeUnit = td.dataset.u;
      switchTab('unit');
      renderUnitView();
      renderGrid();
    };
  });
  // Recalculate cell size on each render (handles first load + tab switch)
  requestAnimationFrame(applyDynamicCellSize);

  // Info bar
  const info = document.getElementById('gridInfo');
  if(displayMode==='overlap'){
    // Compute union and intersections
    const union = new Set();
    groups.forEach(g=>groupHits[g.id].forEach(u=>union.add(u)));
    const countByMembership = {};
    union.forEach(u=>{
      const inCount = groups.filter(g=>groupHits[g.id].has(u)).length;
      countByMembership[inCount] = (countByMembership[inCount]||0)+1;
    });
    const overlapN = Object.entries(countByMembership).filter(([k])=>parseInt(k)>=2).reduce((s,[,v])=>s+v,0);
    const groupStats = groups.map(g=>`<span><i style="background:${g.color}"></i><b>${g.id}</b> ${groupHits[g.id].size}</span>`).join(' ');
    info.innerHTML = `
      <b>겹침 분석 모드</b> · ${groups.length}개 그룹 비교<br>
      총 ${union.size}세대 포함 · 2개 이상 그룹에 동시 포함 <b>${overlapN}</b>세대
      <div class="legend">
        ${groupStats}
        <span><i style="background:#d63384"></i>겹침 (2개+)</span>
      </div>`;
  } else if(displayMode==='group'){
    const g = groups.find(x=>x.id===activeGroupId);
    const hits = groupHits[activeGroupId];
    info.innerHTML = `<b>그룹 ${g.id}</b> 표시 중 (${g.mode}) · 매칭 세대 <span class="hit-count" style="background:${g.color}">${hits.size}</span>`;
  } else if(selected.length===0 && groups.length===0){
    info.innerHTML = '왼쪽에서 옵션을 선택하세요. 여러 개 선택 시 <b>AND</b> / <b>OR</b> 모드로 필터링됩니다. <b>＋ 그룹으로 저장</b>으로 현재 선택을 그룹 A·B·C·D로 저장한 뒤, 그룹 카드를 탭해서 비교하거나 <b>겹침</b> 버튼으로 그룹 간 겹침을 볼 수 있습니다.';
  } else if(selected.length===0){
    info.innerHTML = '그룹 카드를 탭해서 골구도에 표시하거나, 왼쪽에서 옵션을 선택하세요.';
  } else {
    info.innerHTML = `<b>${mode}</b> 모드 · 현재 선택 매칭 세대 <span class="hit-count">${currHits.size}</span>`;
  }
}

function buildUnitSelectors(){
  const dongs = [...new Set(Object.keys(DATA.units).map(c=>c.split('-')[0]))].sort();
  const dongSel = document.getElementById('dongSel');
  dongSel.innerHTML = '<option value="">--</option>'+dongs.map(d=>`<option>${d}</option>`).join('');
  dongSel.onchange = ()=>updateHoSel();
  document.getElementById('hoSel').onchange = ()=>{
    const d=dongSel.value, h=document.getElementById('hoSel').value;
    if(d&&h){activeUnit=d+'-'+h; renderUnitView(); renderGrid()}
  };
  document.getElementById('codeInput').addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const v = e.target.value.trim();
      if(DATA.units[v]){activeUnit=v; syncSelectors(); renderUnitView(); renderGrid()}
      else alert('해당 세대가 없습니다: '+v);
    }
  });
}
function updateHoSel(){
  const d = document.getElementById('dongSel').value;
  const hoSel = document.getElementById('hoSel');
  if(!d){hoSel.innerHTML='<option value="">--</option>';return}
  const hos = Object.keys(DATA.units).filter(c=>c.startsWith(d+'-')).map(c=>c.split('-')[1]).sort();
  hoSel.innerHTML = '<option value="">--</option>'+hos.map(h=>`<option>${h}</option>`).join('');
}
function syncSelectors(){
  if(!activeUnit) return;
  const [d,h] = activeUnit.split('-');
  document.getElementById('dongSel').value = d;
  updateHoSel();
  document.getElementById('hoSel').value = h;
  document.getElementById('codeInput').value = activeUnit;
}
function renderUnitView(){
  const tbl = document.getElementById('unitTable');
  if(!activeUnit){tbl.innerHTML='<div class="empty-msg">동/호수를 선택하거나 골구도에서 셀을 클릭하세요.</div>'; document.getElementById('unitCurrent').textContent=''; return}
  syncSelectors();
  document.getElementById('unitCurrent').textContent = activeUnit;
  const opts = DATA.units[activeUnit] || {};
  let html = '<table class="opts"><tbody>';
  DATA.cats.forEach(cat=>{
    const v = opts[cat.name];
    if(v){
      const matched = isSelected(cat.name,v);
      html += `<tr><th>${cat.name}</th><td class="${matched?'match':'has'}">${v.replace(/\n/g,' ')}${matched?' ★':''}</td></tr>`;
    } else {
      html += `<tr><th>${cat.name}</th><td class="none">—</td></tr>`;
    }
  });
  html += '</tbody></table>';
  tbl.innerHTML = html;
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===t+'View'));
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));

function refreshAll(){
  renderSelectedBar();
  renderSnapSaveBtn();
  renderGroups();
  buildOptList(document.getElementById('optSearch').value);
  renderGrid();
  renderUnitView();
  const cc = document.getElementById('chipCount');
  const total = selected.length;
  if(total>0){cc.textContent=total; cc.classList.add('show')}
  else cc.classList.remove('show');
}

// Drawer (mobile)
const drawer = document.getElementById('drawer');
const overlay = document.getElementById('overlay');
function openDrawer(){drawer.classList.add('open'); overlay.classList.add('show')}
function closeDrawer(){drawer.classList.remove('open'); overlay.classList.remove('show')}
document.getElementById('menuBtn').onclick = openDrawer;
document.getElementById('drawerClose').onclick = closeDrawer;
overlay.onclick = closeDrawer;

// ===== MOBILE SWIPE-TO-CLOSE DRAWER =====
let touchStartX = 0, touchStartY = 0;
drawer.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
drawer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
  if(dx < -48 && dy < 60) closeDrawer();
}, {passive: true});

// ===== PC SIDEBAR COLLAPSE =====
const collapseBtn = document.getElementById('collapseBtn');
let sidebarCollapsed = false;
collapseBtn && collapseBtn.addEventListener('click', () => {
  sidebarCollapsed = !sidebarCollapsed;
  drawer.classList.toggle('collapsed', sidebarCollapsed);
  collapseBtn.textContent = sidebarCollapsed ? '▶' : '◀';
  collapseBtn.title = sidebarCollapsed ? '사이드바 펼치기' : '사이드바 접기';
  // Recalculate grid cell size after transition
  setTimeout(applyDynamicCellSize, 220);
});

// ===== PC DYNAMIC GRID CELL SIZE =====
function applyDynamicCellSize() {
  if(window.innerWidth <= 820) return; // mobile handles via CSS
  const gridWrap = document.getElementById('gridWrap');
  if(!gridWrap) return;
  const scrollEl = gridWrap.closest('.grid-scroll') || gridWrap.parentElement;
  const availW = scrollEl ? scrollEl.clientWidth - 16 : window.innerWidth - 320;
  const cols = DATA.cols; // 44 columns
  const cellW = Math.max(36, Math.floor(availW / cols));
  const cellH = Math.max(24, Math.floor(cellW * 0.52));
  const fontSize = cellW <= 44 ? 9 : cellW <= 52 ? 10 : 11;

  // Inject or update a dynamic style tag
  let styleTag = document.getElementById('dynamic-grid-style');
  if(!styleTag) {
    styleTag = document.createElement('style');
    styleTag.id = 'dynamic-grid-style';
    document.head.appendChild(styleTag);
  }
  styleTag.textContent = `
    @media (min-width: 821px) {
      table.grid td { width: ${cellW}px; min-width: ${cellW}px; height: ${cellH}px; font-size: ${fontSize}px; }
      td.unit { font-size: ${fontSize}px; }
    }
  `;
}

window.addEventListener('resize', applyDynamicCellSize);
applyDynamicCellSize();

document.getElementById('stats').textContent = `세대 ${Object.keys(DATA.units).length}개 · 옵션 카테고리 ${DATA.cats.length}개`;
buildUnitSelectors();
refreshAll();
</script>
